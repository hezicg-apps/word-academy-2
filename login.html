<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>
    // 1. הגדרות Firebase - הדבק כאן את ה-Config שלך
    const firebaseConfig = {
        apiKey: "YOUR_API_KEY",
        authDomain: "YOUR_PROJECT.firebaseapp.com",
        projectId: "YOUR_PROJECT_ID",
        storageBucket: "YOUR_PROJECT.appspot.com",
        messagingSenderId: "YOUR_SENDER_ID",
        appId: "YOUR_APP_ID"
    };

    // אתחול Firebase
    if (!firebase.apps.length) {
        firebase.initializeApp(firebaseConfig);
    }
    const auth = firebase.auth();
    const db = firebase.firestore();

    // 2. טיפול בטופס הכניסה
    document.getElementById('loginForm').onsubmit = async function(e) {
        e.preventDefault();
        
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const submitBtn = e.target.querySelector('button');

        try {
            // שינוי מצב הכפתור ל"טוען"
            submitBtn.textContent = "מתחבר...";
            submitBtn.disabled = true;

            // כניסה למערכת
            const userCredential = await auth.signInWithEmailAndPassword(email, password);
            const user = userCredential.user;

            // שליפת פרטי המורה המשלימים מה-Firestore (כמו שם ובית ספר)
            const teacherDoc = await db.collection('teachers').doc(user.uid).get();
            
            let teacherData = {
                uid: user.uid,
                email: user.email,
                firstName: "מורה", // ברירת מחדל אם לא נמצא שם
                school: "בית ספר כללי"
            };

            if (teacherDoc.exists) {
                teacherData = { ...teacherData, ...teacherDoc.data() };
            }

            // שמירת הנתונים בזיכרון המקומי למעבר לדשבורד
            localStorage.setItem('user', JSON.stringify(teacherData));

            // מעבר לדשבורד
            window.location.href = "teacher-dashboard.html";

        } catch (error) {
            console.error("Login Error:", error);
            alert("שגיאה בכניסה: " + error.message);
            submitBtn.textContent = "כניסה";
            submitBtn.disabled = false;
        }
    };
</script>
