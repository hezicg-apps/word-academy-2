<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Word Academy | מרחב מורה</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
</head>
<body class="bg-slate-50 min-h-screen font-[Assistant]">

<header class="bg-white shadow-sm p-4 flex justify-between items-center">
    <div class="flex items-center gap-4">
        <img src="logo.svg" alt="Logo" class="w-12 h-12">
        <div>
            <h1 id="teacher-greeting" class="text-xl font-bold text-slate-800">טוען...</h1>
            <div id="school-display" class="text-sm text-blue-600 font-semibold"></div>
        </div>
    </div>
    <button onclick="logout()" class="text-slate-500 font-bold px-4 hover:text-red-600">התנתקות</button>
</header>

<main class="max-w-6xl mx-auto p-8">
    <div class="flex justify-between items-center mb-6">
        <h2 class="text-2xl font-black text-slate-700">ניהול כיתות וביצועים</h2>
        <button onclick="openAddClassModal()" class="bg-blue-600 text-white px-6 py-2 rounded-full font-bold shadow-lg hover:bg-blue-700 transition-all">+ כיתה חדשה</button>
    </div>

    <div class="bg-white rounded-2xl shadow-sm border border-slate-200 min-h-[400px] flex flex-col">
        <div id="class-tabs" class="flex border-b overflow-x-auto bg-slate-50/50">
            </div>
        <div id="tab-content" class="p-10 flex-grow flex flex-col items-center justify-center text-slate-400">
            <p id="status-message">טוען נתונים...</p>
        </div>
    </div>
</main>

<div id="class-modal" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center z-[100] backdrop-blur-sm">
    <div class="bg-white rounded-2xl p-8 w-full max-w-sm shadow-2xl">
        <h3 class="text-xl font-bold mb-4 text-slate-800">הוספת כיתה חדשה</h3>
        <input type="text" id="input-class-name" placeholder="שם הכיתה (למשל: ה'1)" class="w-full p-3 border border-slate-200 rounded-xl mb-4 outline-none focus:ring-2 focus:ring-blue-500">
        <select id="input-class-grade" class="w-full p-3 border border-slate-200 rounded-xl mb-6 outline-none">
            <option value="ג">כיתה ג'</option>
            <option value="ד">כיתה ד'</option>
            <option value="ה">כיתה ה'</option>
            <option value="ו">כיתה ו'</option>
        </select>
        <div class="flex gap-2">
            <button onclick="closeModal()" class="flex-1 py-2 text-slate-500 font-bold hover:bg-slate-100 rounded-xl">ביטול</button>
            <button onclick="saveClass()" class="flex-1 py-2 bg-blue-600 text-white rounded-xl font-bold hover:bg-blue-700">שמירה</button>
        </div>
    </div>
</div>

<script>
    // הגדרות Firebase - הדבק את שלך כאן
    const firebaseConfig = {
        apiKey: "YOUR_API_KEY",
        authDomain: "YOUR_PROJECT.firebaseapp.com",
        projectId: "YOUR_PROJECT_ID",
        storageBucket: "YOUR_PROJECT.appspot.com",
        messagingSenderId: "YOUR_SENDER_ID",
        appId: "YOUR_APP_ID"
    };

    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let currentUser = null;
    let allClasses = [];

    // פונקציית האתחול המרכזית
    async function init() {
        const userData = localStorage.getItem('user');
        
        if (!userData) {
            alert("לא נמצא משתמש מחובר. נא להיכנס למערכת.");
            window.location.href = 'login.html';
            return;
        }

        currentUser = JSON.parse(userData);
        
        // עדכון ממשק לפי שם המורה האמיתי מה-Login
        document.getElementById('teacher-greeting').textContent = `שלום ${currentUser.firstName || 'מורה'},`;
        document.getElementById('school-display').textContent = currentUser.school || "בית ספר לא מוגדר";
        
        await loadClasses();
    }

    async function loadClasses() {
        try {
            // שליפת כיתות לפי ה-ID הייחודי של המורה שנכנס
            const snapshot = await db.collection('classes')
                .where('teacherId', '==', currentUser.uid || currentUser.id)
                .get();
            
            allClasses = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            renderTabs();
        } catch (e) {
            console.error("שגיאה בטעינת כיתות:", e);
            document.getElementById('status-message').textContent = "שגיאה בטעינת הנתונים.";
        }
    }

    function renderTabs() {
        const container = document.getElementById('class-tabs');
        if (allClasses.length === 0) {
            container.innerHTML = "";
            document.getElementById('status-message').textContent = "אין כיתות רשומות. לחץ על '+ כיתה חדשה' כדי להתחיל.";
            return;
        }

        container.innerHTML = allClasses.map(c => `
            <button onclick="selectClass('${c.id}')" id="tab-${c.id}" class="px-6 py-4 font-bold border-b-2 border-transparent hover:bg-white transition-all text-slate-500">
                כיתה ${c.className}
            </button>
        `).join('');
        
        selectClass(allClasses[0].id);
    }

    function selectClass(id) {
        document.querySelectorAll('#class-tabs button').forEach(b => {
            b.classList.remove('border-blue-600', 'text-blue-600', 'bg-white');
            b.classList.add('text-slate-500');
        });

        const activeTab = document.getElementById(`tab-${id}`);
        activeTab.classList.add('border-blue-600', 'text-blue-600', 'bg-white');
        activeTab.classList.remove('text-slate-500');

        const cls = allClasses.find(c => c.id === id);
        document.getElementById('tab-content').innerHTML = `
            <div class="w-full text-right animate-fade-in">
                <h3 class="text-2xl font-black text-slate-800 mb-2">כיתה ${cls.className} (${cls.grade})</h3>
                <p class="text-slate-500 mb-8 border-b pb-4">ריכוז ביצועי תלמידים</p>
                <div class="bg-slate-50 p-6 rounded-xl border border-dashed border-slate-300 text-center">
                    <p class="text-slate-400 italic font-medium">כאן יוצגו הציונים והתקדמות התלמידים ביחידות הלימוד.</p>
                </div>
            </div>
        `;
    }

    async function saveClass() {
        const name = document.getElementById('input-class-name').value;
        const grade = document.getElementById('input-class-grade').value;

        if (!name) {
            alert("נא להזין שם כיתה");
            return;
        }

        const newClass = {
            className: name,
            grade: grade,
            teacherId: currentUser.uid || currentUser.id,
            school: currentUser.school,
            createdAt: firebase.firestore.FieldValue.serverTimestamp()
        };

        try {
            await db.collection('classes').add(newClass);
            closeModal();
            await loadClasses(); // רענון הלשוניות
        } catch (e) {
            alert("שגיאה בשמירה: " + e.message);
        }
    }

    function openAddClassModal() {
        document.getElementById('input-class-name').value = '';
        document.getElementById('class-modal').classList.remove('hidden');
    }

    function closeModal() {
        document.getElementById('class-modal').classList.add('hidden');
    }

    function logout() {
        localStorage.clear();
        window.location.href = 'index.html';
    }

    init();
</script>
</body>
</html>
