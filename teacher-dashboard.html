<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Word Academy | מרחב מורה</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;600;800&display=swap');
        body { font-family: 'Assistant', sans-serif; background-color: #f1f5f9; }
        .tab-active { border-bottom: 4px solid #2563eb; color: #2563eb; font-weight: 800; }
        .glass-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="min-h-screen">

<header class="bg-white shadow-sm px-8 py-4 flex justify-between items-center sticky top-0 z-50">
    <div class="flex items-center gap-6">
        <img src="logo.svg" alt="WA" class="w-12 h-12 cursor-pointer" onclick="location.href='index.html'">
        <div>
            <h1 id="teacher-greeting" class="text-2xl font-black text-slate-800">טוען...</h1>
            <div class="flex items-center gap-2">
                <select id="school-selector" onchange="switchSchool()" class="text-sm font-semibold text-blue-600 bg-blue-50 border-none rounded-lg px-2 py-1 cursor-pointer focus:ring-2 focus:ring-blue-500">
                    </select>
            </div>
        </div>
    </div>
    <button onclick="logout()" class="text-slate-500 hover:text-red-600 font-bold transition-colors">התנתקות</button>
</header>

<main class="max-w-7xl mx-auto p-8">
    <div class="flex justify-between items-center mb-8">
        <h2 class="text-xl font-extrabold text-slate-700">ניהול כיתות וביצועים</h2>
        <button onclick="openAddClassModal()" class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-2.5 rounded-full font-bold shadow-lg transition-transform active:scale-95">
            + כיתה חדשה
        </button>
    </div>

    <div class="glass-card rounded-3xl shadow-xl overflow-hidden">
        <div class="flex border-b border-slate-200 bg-slate-50/50 overflow-x-auto" id="class-tabs">
            </div>

        <div id="tab-content" class="p-8">
            <div class="flex flex-col items-center justify-center py-20 text-slate-400">
                <p class="text-lg">בחר כיתה כדי לצפות בנתונים</p>
            </div>
        </div>
    </div>
</main>

<div id="class-modal" class="hidden fixed inset-0 bg-black/50 backdrop-blur-sm flex items-center justify-center z-[100]">
    <div class="bg-white rounded-3xl p-8 w-full max-w-md shadow-2xl">
        <h3 id="modal-title" class="text-2xl font-black mb-6 text-slate-800">הוספת כיתה חדשה</h3>
        <div class="space-y-4">
            <div>
                <label class="block text-sm font-bold text-slate-600 mb-1">שם הכיתה (למשל: ה'1)</label>
                <input type="text" id="input-class-name" class="w-full p-3 bg-slate-100 border-none rounded-xl focus:ring-2 focus:ring-blue-500 outline-none">
            </div>
            <div>
                <label class="block text-sm font-bold text-slate-600 mb-1">שכבת גיל</label>
                <select id="input-class-grade" class="w-full p-3 bg-slate-100 border-none rounded-xl outline-none">
                    <option value="ג">כיתה ג'</option>
                    <option value="ד">כיתה ד'</option>
                    <option value="ה">כיתה ה'</option>
                    <option value="ו">כיתה ו'</option>
                </select>
            </div>
        </div>
        <div class="flex gap-3 mt-8">
            <button onclick="closeModal()" class="flex-1 py-3 font-bold text-slate-500 hover:bg-slate-100 rounded-xl transition-colors">ביטול</button>
            <button id="btn-save-class" class="flex-1 py-3 bg-blue-600 text-white font-bold rounded-xl shadow-blue-200 shadow-lg hover:bg-blue-700 transition-all">שמירה</button>
        </div>
    </div>
</div>

<script>
   npm install firebase

    let currentUser = JSON.parse(localStorage.getItem('user')) || { firstName: "חזי", schools: ["ביה״ס אדנים", "ביה״ס דקלים"], id: "teacher123" };
    let currentSchool = currentUser.schools[0];
    let allClasses = [];

    // אתחול דף
    function init() {
        document.getElementById('teacher-greeting').textContent = `שלום ${currentUser.firstName},`;
        
        // טעינת בתי ספר ל-Dropdown
        const schoolSelector = document.getElementById('school-selector');
        schoolSelector.innerHTML = currentUser.schools.map(s => `<option value="${s}">${s}</option>`).join('');
        
        loadClasses();
    }

    async function loadClasses() {
        // שאילתה ל-Firestore שמביאה כיתות של המורה בבית הספר הנבחר
        const snapshot = await db.collection('classes')
            .where('teacherId', '==', currentUser.id)
            .where('school', '==', currentSchool)
            .get();

        allClasses = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
        renderTabs();
    }

    function renderTabs() {
        const tabsContainer = document.getElementById('class-tabs');
        tabsContainer.innerHTML = allClasses.map((c, index) => `
            <button onclick="selectClass('${c.id}')" id="tab-${c.id}" class="px-8 py-5 text-sm font-bold border-b-4 border-transparent hover:bg-slate-100 transition-all whitespace-nowrap">
                כיתה ${c.className}
            </button>
        `).join('');
        
        if (allClasses.length > 0) selectClass(allClasses[0].id);
    }

    async function selectClass(classId) {
        // עדכון ויזואלי של הלשוניות
        document.querySelectorAll('#class-tabs button').forEach(b => b.classList.remove('tab-active'));
        document.getElementById(`tab-${classId}`).classList.add('tab-active');

        const cls = allClasses.find(c => c.id === classId);
        
        // טעינת ביצועי תלמידים (סימולציה של נתונים)
        const content = document.getElementById('tab-content');
        content.innerHTML = `
            <div class="flex justify-between items-start mb-8">
                <div>
                    <h3 class="text-2xl font-black text-slate-800">כיתה ${cls.className} (${cls.grade})</h3>
                    <p class="text-slate-500 font-medium">ריכוז ביצועים והתקדמות</p>
                </div>
                <button onclick="openEditModal('${cls.id}')" class="text-blue-600 font-bold hover:underline">ערוך הגדרות כיתה</button>
            </div>

            <div class="overflow-x-auto">
                <table class="w-full text-right border-collapse">
                    <thead>
                        <tr class="text-slate-400 text-sm border-b border-slate-100">
                            <th class="pb-4 font-bold">שם התלמיד</th>
                            <th class="pb-4 font-bold">יחידה אחרונה</th>
                            <th class="pb-4 font-bold">ציון</th>
                            <th class="pb-4 font-bold">סטטוס</th>
                            <th class="pb-4"></th>
                        </tr>
                    </thead>
                    <tbody class="text-slate-700">
                        <tr class="border-b border-slate-50 hover:bg-slate-50/50 transition-colors">
                            <td class="py-4 font-bold">ישראל ישראלי</td>
                            <td class="py-4">Unit 2: Colors</td>
                            <td class="py-4"><span class="bg-green-100 text-green-700 px-3 py-1 rounded-full text-xs font-black">95</span></td>
                            <td class="py-4">🟢 הושלם</td>
                            <td class="py-4 text-left"><button class="text-blue-500 font-bold text-sm italic hover:underline">פירוט מלא</button></td>
                        </tr>
                    </tbody>
                </table>
            </div>
        `;
    }

    function switchSchool() {
        currentSchool = document.getElementById('school-selector').value;
        loadClasses();
    }

    function openEditModal(id) {
        const cls = allClasses.find(c => c.id === id);
        document.getElementById('modal-title').textContent = "עריכת כיתה";
        document.getElementById('input-class-name').value = cls.className;
        document.getElementById('input-class-grade').value = cls.grade;
        document.getElementById('btn-save-class').onclick = () => saveClass(id);
        document.getElementById('class-modal').classList.remove('hidden');
    }

    async function saveClass(id) {
        const name = document.getElementById('input-class-name').value;
        const grade = document.getElementById('input-class-grade').value;

        if (id) {
            // עדכון
            await db.collection('classes').doc(id).update({ className: name, grade: grade });
        } else {
            // הוספה חדשה
            await db.collection('classes').add({
                className: name,
                grade: grade,
                teacherId: currentUser.id,
                school: currentSchool,
                createdAt: new Date()
            });
        }
        closeModal();
        loadClasses();
    }

    function logout() {
        localStorage.removeItem('user');
        window.location.href = 'index.html';
    }

    function closeModal() { document.getElementById('class-modal').classList.add('hidden'); }
    function openAddClassModal() { 
        document.getElementById('modal-title').textContent = "כיתה חדשה";
        document.getElementById('input-class-name').value = '';
        document.getElementById('btn-save-class').onclick = () => saveClass();
        document.getElementById('class-modal').classList.remove('hidden'); 
    }

    init();
</script>
</body>
</html>
