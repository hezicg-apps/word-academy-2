<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Word Academy | מרחב מורה</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;600;800&display=swap');
        body { font-family: 'Assistant', sans-serif; background-color: #f1f5f9; margin: 0; }
        .tab-active { border-bottom: 4px solid #2563eb; color: #2563eb; font-weight: 800; }
    </style>
</head>
<body class="min-h-screen">

<header class="bg-white shadow-sm px-8 py-4 flex justify-between items-center sticky top-0 z-50">
    <div class="flex items-center gap-6">
        <img src="logo.svg" alt="WA" class="w-12 h-12 cursor-pointer" onclick="location.href='index.html'">
        <div>
            <h1 id="teacher-greeting" class="text-2xl font-black text-slate-800">שלום,</h1>
            <div class="flex items-center gap-2">
                <select id="school-selector" onchange="switchSchool()" class="text-sm font-semibold text-blue-600 bg-blue-50 border-none rounded-lg px-2 py-1 cursor-pointer">
                    </select>
            </div>
        </div>
    </div>
    <button onclick="logout()" class="text-slate-500 hover:text-red-600 font-bold transition-colors">התנתקות</button>
</header>

<main class="max-w-7xl mx-auto p-8">
    <div class="flex justify-between items-center mb-8">
        <h2 class="text-xl font-extrabold text-slate-700">ניהול כיתות וביצועים</h2>
        <button onclick="openAddClassModal()" class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-2.5 rounded-full font-bold shadow-lg transition-transform active:scale-95">
            + כיתה חדשה
        </button>
    </div>

    <div class="bg-white rounded-3xl shadow-xl overflow-hidden">
        <div class="flex border-b border-slate-200 bg-slate-50/50 overflow-x-auto" id="class-tabs">
            </div>
        <div id="tab-content" class="p-8">
            <div class="flex flex-col items-center justify-center py-20 text-slate-400">
                <p class="text-lg">בחר כיתה מהלשוניות למעלה או צור כיתה חדשה</p>
            </div>
        </div>
    </div>
</main>

<div id="class-modal" class="hidden fixed inset-0 bg-black/50 backdrop-blur-sm flex items-center justify-center z-[100]">
    <div class="bg-white rounded-3xl p-8 w-full max-w-md shadow-2xl">
        <h3 id="modal-title" class="text-2xl font-black mb-6 text-slate-800">הוספת כיתה חדשה</h3>
        <div class="space-y-4">
            <input type="text" id="input-class-name" placeholder="שם הכיתה (למשל: ה'1)" class="w-full p-3 bg-slate-100 rounded-xl outline-none">
            <select id="input-class-grade" class="w-full p-3 bg-slate-100 rounded-xl outline-none">
                <option value="ג">כיתה ג'</option>
                <option value="ד">כיתה ד'</option>
                <option value="ה">כיתה ה'</option>
                <option value="ו">כיתה ו'</option>
            </select>
        </div>
        <div class="flex gap-3 mt-8">
            <button onclick="closeModal()" class="flex-1 py-3 font-bold text-slate-500">ביטול</button>
            <button id="btn-save-class" class="flex-1 py-3 bg-blue-600 text-white font-bold rounded-xl">שמירה</button>
        </div>
    </div>
</div>

<script>
    // --- הגדרות FIREBASE ---
    const firebaseConfig = {
        // *** הדבק כאן את הקונפיגורציה שלך מה-Firebase Console ***
    };

    if (!firebase.apps.length) {
        firebase.initializeApp(firebaseConfig);
    }
    const db = firebase.firestore();

    // נתוני משתמש - חילוץ מהזיכרון או ברירת מחדל
    let currentUser = JSON.parse(localStorage.getItem('user')) || { 
        firstName: "חזי", 
        schools: ["ביה״ס אדנים", "ביה״ס דקלים"], 
        id: "teacher_default" 
    };
    
    let currentSchool = currentUser.schools[0];
    let allClasses = [];

    function init() {
        document.getElementById('teacher-greeting').textContent = `שלום ${currentUser.firstName},`;
        const selector = document.getElementById('school-selector');
        selector.innerHTML = currentUser.schools.map(s => `<option value="${s}">${s}</option>`).join('');
        loadClasses();
    }

    async function loadClasses() {
        try {
            const snapshot = await db.collection('classes')
                .where('teacherId', '==', currentUser.id)
                .where('school', '==', currentSchool)
                .get();
            allClasses = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            renderTabs();
        } catch (e) {
            console.error("Error loading classes:", e);
        }
    }

    function renderTabs() {
        const container = document.getElementById('class-tabs');
        if (allClasses.length === 0) {
            container.innerHTML = '<p class="p-5 text-slate-400 text-sm">אין כיתות רשומות בבית ספר זה</p>';
            return;
        }
        container.innerHTML = allClasses.map(c => `
            <button onclick="selectClass('${c.id}')" id="tab-${c.id}" class="px-8 py-5 text-sm font-bold border-b-4 border-transparent hover:bg-slate-100 transition-all">
                כיתה ${c.className}
            </button>
        `).join('');
        selectClass(allClasses[0].id);
    }

    function selectClass(id) {
        document.querySelectorAll('#class-tabs button').forEach(b => b.classList.remove('tab-active'));
        const activeTab = document.getElementById(`tab-${id}`);
        if(activeTab) activeTab.classList.add('tab-active');

        const cls = allClasses.find(c => c.id === id);
        document.getElementById('tab-content').innerHTML = `
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-2xl font-black">כיתה ${cls.className} (${cls.grade})</h3>
                <button onclick="openEditModal('${cls.id}')" class="text-blue-600 font-bold">ערוך כיתה</button>
            </div>
            <p class="text-slate-400">כאן יוצגו נתוני הביצועים של תלמידי ${cls.className}...</p>
        `;
    }

    async function saveClass(id) {
        const name = document.getElementById('input-class-name').value;
        const grade = document.getElementById('input-class-grade').value;
        if (!name) return alert("נא להזין שם כיתה");

        const classData = {
            className: name,
            grade: grade,
            teacherId: currentUser.id,
            school: currentSchool,
            updatedAt: new Date()
        };

        if (id) {
            await db.collection('classes').doc(id).update(classData);
        } else {
            await db.collection('classes').add(classData);
        }
        closeModal();
        loadClasses();
    }

    function logout() {
        localStorage.clear();
        sessionStorage.clear();
        window.location.href = 'https://hezicg-apps.github.io/word-academy-2/index.html';
    }

    function switchSchool() {
        currentSchool = document.getElementById('school-selector').value;
        loadClasses();
    }

    function openAddClassModal() {
        document.getElementById('modal-title').textContent = "כיתה חדשה";
        document.getElementById('input-class-name').value = '';
        document.getElementById('btn-save-class').onclick = () => saveClass();
        document.getElementById('class-modal').classList.remove('hidden');
    }

    function openEditModal(id) {
        const cls = allClasses.find(c => c.id === id);
        document.getElementById('modal-title').textContent = "עריכת כיתה";
        document.getElementById('input-class-name').value = cls.className;
        document.getElementById('btn-save-class').onclick = () => saveClass(id);
        document.getElementById('class-modal').classList.remove('hidden');
    }

    function closeModal() { document.getElementById('class-modal').classList.add('hidden'); }

    init();
</script>
</body>
</html>
