<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Word Academy - Library</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        body { background-color: #f0f4f8; overflow-y: auto; }
        .library-container { display: flex; gap: 20px; justify-content: center; padding: 40px 20px; flex-wrap: wrap; }
        .book-column { 
            background: white; border-radius: 20px; border: 2px solid #e2e8f0; 
            width: 320px; min-height: 500px; display: flex; flex-direction: column; 
            overflow: hidden; box-shadow: 0 4px 6px rgba(0,0,0,0.05); 
        }
        .book-header { padding: 20px; text-align: center; color: white; font-weight: bold; font-size: 24px; }
        .book-magical { background-color: #6366f1; }
        .book-legendary { background-color: #f59e0b; }
        .book-epic { background-color: #10b981; }
        .units-list { padding: 15px; flex: 1; }
        .unit-item { background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 12px; margin-bottom: 15px; padding: 12px; }
        .unit-title { font-weight: bold; color: #1e293b; display: block; margin-bottom: 8px; font-size: 18px; }
        .parts-container { display: flex; gap: 8px; }
        .part-btn { 
            flex: 1; background: white; border: 2px solid #3b82f6; color: #3b82f6; 
            padding: 6px; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.2s;
        }
        .part-btn:hover { background: #3b82f6; color: white; }
        .loader { text-align: center; margin-top: 50px; font-size: 20px; color: #64748b; }
    </style>
</head>
<body>

<div class="header">
    <div id="user-display">שלום, מורה יקר!</div>
    <div class="header-left">
        <img src="logo.svg" alt="WA" class="logo-img">
        <h2 style="font-size:18px; color:#3b82f6; margin:0;">Word Academy</h2>
    </div>
</div>

<h1 style="text-align:center; margin-top:30px; color:#1e293b;">הספרייה הדיגיטלית שלי</h1>

<div id="loader" class="loader">טוען את כל היחידות מהגיליון...</div>
<div class="library-container" id="library-content"></div>

<script>
    // הקישור לגיליון שלך בפורמט CSV
    const sheetUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQTBLf3lCxJ0JcbeEc9nCB7eoyFKN98wIem2rDUYMBoup8Yw6kkv_T41BqwnILLBQXE5ibWV9HJAOzC/pub?output=csv';

    async function loadLibrary() {
        try {
            const response = await fetch(sheetUrl);
            const data = await response.text();
            const rows = data.split('\n').slice(1); // דלג על כותרות

            const books = {};

            rows.forEach(row => {
                // פיצול חכם שמתחשב במירכאות ופסיקים בתוך המילים
                const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                if (cols.length < 4) return;

                const bookName = cols[0].trim().replace(/"/g, '');
                const unitName = cols[1].trim().replace(/"/g, '');
                const partName = cols[2].trim().replace(/"/g, '');
                const words = cols[3].trim().replace(/"/g, '').replace(/\\n/g, '\n');

                if (!books[bookName]) books[bookName] = {};
                if (!books[bookName][unitName]) books[bookName][unitName] = [];
                
                books[bookName][unitName].push({ name: partName, data: words });
            });

            renderLibrary(books);
            document.getElementById('loader').style.display = 'none';
        } catch (err) {
            document.getElementById('loader').innerText = "שגיאה בטעינת הנתונים. וודא שהגיליון מפורסם.";
        }
    }

    function renderLibrary(books) {
        const container = document.getElementById('library-content');
        for (const bName in books) {
            const col = document.createElement('div');
            col.className = 'book-column';
            const colorClass = `book-${bName.toLowerCase()}`;
            col.innerHTML = `<div class="book-header ${colorClass}">${bName}</div><div class="units-list" id="list-${bName}"></div>`;
            container.appendChild(col);

            const list = document.getElementById(`list-${bName}`);
            for (const uName in books[bName]) {
                const item = document.createElement('div');
                item.className = 'unit-item';
                let btns = '';
                books[bName][uName].forEach(p => {
                    // קידוד המילים כדי להעביר אותן בבטחה ב-URL
                    const encoded = btoa(unescape(encodeURIComponent(p.data)));
                    btns += `<button class="part-btn" onclick="goToGame('${uName}', '${p.name}', '${encoded}')">${p.name}</button>`;
                });
                item.innerHTML = `<span class="unit-title">${uName}</span><div class="parts-container">${btns}</div>`;
                list.appendChild(item);
            }
        }
    }

    function goToGame(u, p, data) {
        const words = decodeURIComponent(escape(atob(data)));
        sessionStorage.setItem('currentWords', `${u} - ${p}\n${words}`);
        window.location.href = 'index.html?source=library';
    }

    window.onload = loadLibrary;
</script>
</body>
</html>
