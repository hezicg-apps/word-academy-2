<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Word Academy - Library</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        body { background-color: #f0f4f8; overflow-y: auto; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        
        .library-container { 
            display: flex; gap: 20px; justify-content: center; 
            padding: 40px 20px; flex-wrap: wrap; max-width: 1400px; margin: 0 auto;
        }

        .book-column { 
            background: white; border-radius: 20px; border: 2px solid #e2e8f0; 
            width: 320px; min-height: 400px; display: flex; flex-direction: column; 
            overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.05); 
        }

        .book-header { padding: 20px; text-align: center; color: white; font-weight: bold; font-size: 24px; }
        .book-magical { background-color: #6366f1; }
        .book-legendary { background-color: #f59e0b; }
        .book-epic { background-color: #10b981; }
        /* טור נוסף אם קיים בגיליון ללא שם מוגדר */
        .book-default { background-color: #64748b; }

        .units-list { padding: 15px; flex: 1; display: flex; flex-direction: column; gap: 10px; }

        /* עיצוב ה-Dropdown */
        .unit-dropdown {
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .unit-header {
            background: #f8fafc;
            padding: 12px 15px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: bold;
            color: #1e293b;
            border-bottom: 1px solid transparent;
        }

        .unit-header:hover { background: #f1f5f9; }

        .unit-header::after {
            content: '▼';
            font-size: 12px;
            transition: transform 0.3s;
        }

        .unit-dropdown.open .unit-header::after { transform: rotate(180deg); }
        .unit-dropdown.open .unit-header { border-bottom-color: #e2e8f0; background: #f1f5f9; }

        .parts-content {
            display: none;
            padding: 10px;
            background: white;
            flex-direction: column;
            gap: 8px;
        }

        .unit-dropdown.open .parts-content { display: flex; }

        .part-btn { 
            width: 100%;
            background: white; border: 1px solid #3b82f6; color: #3b82f6; 
            padding: 8px; border-radius: 8px; font-weight: bold; cursor: pointer; 
            transition: 0.2s; text-align: center;
        }
        
        .part-btn:hover { background: #3b82f6; color: white; }

        .loader { text-align: center; margin-top: 50px; font-size: 20px; color: #64748b; }
    </style>
</head>
<body>

<div class="header">
    <div id="user-display">שלום, מורה יקר!</div>
    <div class="header-left">
        <img src="logo.svg" alt="WA" class="logo-img">
        <h2 style="font-size:18px; color:#3b82f6; margin:0;">Word Academy</h2>
    </div>
</div>

<h1 style="text-align:center; margin-top:30px; color:#1e293b;">הספרייה הדיגיטלית שלי</h1>

<div id="loader" class="loader">טוען את היחידות מהגיליון...</div>
<div class="library-container" id="library-content"></div>

<script>
    const sheetUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQTBLf3lCxJ0JcbeEc9nCB7eoyFKN98wIem2rDUYMBoup8Yw6kkv_T41BqwnILLBQXE5ibWV9HJAOzC/pub?output=csv';

    async function loadLibrary() {
        try {
            const response = await fetch(sheetUrl);
            const data = await response.text();
            const rows = data.split('\n').slice(1);

            const books = {};

            rows.forEach(row => {
                const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                if (cols.length < 4) return;

                const bookName = cols[0].trim().replace(/"/g, '') || "כללי";
                const unitName = cols[1].trim().replace(/"/g, '');
                const partName = cols[2].trim().replace(/"/g, '');
                const words = cols[3].trim().replace(/"/g, '').replace(/\\n/g, '\n');

                if (!books[bookName]) books[bookName] = {};
                if (!books[bookName][unitName]) books[bookName][unitName] = [];
                
                books[bookName][unitName].push({ name: partName, data: words });
            });

            renderLibrary(books);
            document.getElementById('loader').style.display = 'none';
        } catch (err) {
            document.getElementById('loader').innerText = "שגיאה בטעינת הנתונים.";
        }
    }

    function renderLibrary(books) {
        const container = document.getElementById('library-content');
        for (const bName in books) {
            const col = document.createElement('div');
            col.className = 'book-column';
            const colorClass = `book-${bName.toLowerCase()}`;
            
            col.innerHTML = `
                <div class="book-header ${colorClass}">${bName}</div>
                <div class="units-list" id="list-${bName}"></div>
            `;
            container.appendChild(col);

            const list = document.getElementById(`list-${bName}`);
            for (const uName in books[bName]) {
                const dropdown = document.createElement('div');
                dropdown.className = 'unit-dropdown';
                
                let partsHTML = '';
                books[bName][uName].forEach(p => {
                    const encoded = btoa(unescape(encodeURIComponent(p.data)));
                    partsHTML += `<button class="part-btn" onclick="goToGame('${uName}', '${p.name}', '${encoded}')">${p.name}</button>`;
                });

                dropdown.innerHTML = `
                    <div class="unit-header" onclick="this.parentElement.classList.toggle('open')">
                        ${uName}
                    </div>
                    <div class="parts-content">
                        ${partsHTML}
                    </div>
                `;
                list.appendChild(dropdown);
            }
        }
    }

    function goToGame(u, p, data) {
        const words = decodeURIComponent(escape(atob(data)));
        sessionStorage.setItem('currentWords', `${u} - ${p}\n${words}`);
        window.location.href = 'index.html?source=library';
    }

    window.onload = loadLibrary;
</script>
</body>
</html>
