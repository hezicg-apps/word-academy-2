<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Word Academy | Game Library</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;600;800&display=swap');
        body { font-family: 'Assistant', sans-serif; background-color: #f3f4f6; }
        .ltr-content { direction: ltr; text-align: left; }
        .accordion-content { max-height: 0; overflow: hidden; transition: max-height 0.4s cubic-bezier(0, 1, 0, 1); }
        .accordion-open .accordion-content { max-height: 1000px; transition: max-height 0.4s ease-in; }
        .chevron { transition: transform 0.3s ease; }
        .accordion-open .chevron { transform: rotate(180deg); }
    </style>
</head>
<body class="min-h-screen">

    <header class="bg-white/80 backdrop-blur-md shadow-sm py-4 px-6 md:px-12 flex justify-between items-center sticky top-0 z-50">
        <div class="flex items-center gap-4">
            <img src="logo.svg" alt="WA" class="w-12 h-12">
            <h1 class="text-2xl font-black text-blue-900">Word Academy</h1>
        </div>
        <h2 class="text-lg font-bold text-slate-500">ספריית המילים למשחקים</h2>
    </header>

    <main class="max-w-7xl mx-auto p-6 md:p-12">
        <div id="library-grid" class="grid grid-cols-1 md:grid-cols-3 gap-10">
            <p class="text-center col-span-full text-slate-500 animate-pulse">מתחבר למאגר המילים...</p>
        </div>
    </main>

    <script>
        const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQTBLf3lCxJ0JcbeEc9nCB7eoyFKN98wIem2rDUYMBoup8Yw6kkv_T41BqwnILLBQXE5ibWV9HJAOzC/pub?output=csv';

        async function initLibrary() {
            try {
                const response = await fetch(CSV_URL);
                const data = await response.text();
                const booksData = parseCSV(data);
                renderLibrary(booksData);
            } catch (error) {
                console.error("Error loading library:", error);
            }
        }

       function parseCSV(text) {
    const lines = text.split('\n');
    const books = {};
    
    for (let i = 1; i < lines.length; i++) {
        const row = lines[i];
        // פיצול שמתחשב במירכאות סביב רשימת המילים
        const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
        
        if (cols.length < 5) continue;

        const bookName = cols[0]?.trim().replace(/"/g, '') || "";
        const grade    = cols[1]?.trim().replace(/"/g, '') || "";
        const chapter  = cols[2]?.trim().replace(/"/g, '') || "";
        const unit     = cols[3]?.trim().replace(/"/g, '') || "";
        
        // כאן התיקון: 
        // אם בגיליון שלך המילים נמצאות אחרי הלינק, זה כנראה cols[5].
        // אם הלינק הוא מה שמוצג בתמונה, אנחנו צריכים את הטור הבא אחריו.
        let words = cols[4]?.trim().replace(/"/g, '').replace(/\\n/g, '\n') || "";
        
        // בדיקה: אם המילים ששלפנו נראות כמו לינק (מתחיל ב-http), קח את הטור הבא
        if (words.startsWith('http')) {
            words = cols[5]?.trim().replace(/"/g, '').replace(/\\n/g, '\n') || "";
        }

        const color = cols[6] ? cols[6].trim().replace(/"/g, '') : '#3b82f6';

        if (!books[bookName]) {
            books[bookName] = { grade, color, chapters: {} };
        }
        if (!books[bookName].chapters[chapter]) {
            books[bookName].chapters[chapter] = [];
        }
        books[bookName].chapters[chapter].push({ unit, words });
    }
    return books;
}

        function renderLibrary(books) {
            const grid = document.getElementById('library-grid');
            grid.innerHTML = '';

            Object.entries(books).forEach(([bookName, info]) => {
                const card = document.createElement('div');
                card.className = "bg-white rounded-[2.5rem] shadow-[0_20px_50px_rgba(0,0,0,0.1)] overflow-hidden flex flex-col hover:translate-y-[-5px] transition-all duration-300";
                card.style.borderTop = `8px solid ${info.color}`;

                let accordionHtml = '';
                Object.entries(info.chapters).forEach(([chapter, units]) => {
                    accordionHtml += `
                        <div class="border-b border-slate-50 accordion-item">
                            <button onclick="this.parentElement.classList.toggle('accordion-open')" class="w-full py-4 px-6 flex justify-between items-center hover:bg-slate-50 group">
                                <span class="chevron text-slate-300 group-hover:text-blue-500">▼</span>
                                <span class="ltr-content font-bold text-slate-700">${chapter}</span>
                            </button>
                            <div class="accordion-content bg-slate-50/50">
                                <div class="px-6 py-2 flex flex-col gap-2 ltr-content">
                                    ${units.map(u => {
                                        const encoded = btoa(unescape(encodeURIComponent(u.words)));
                                        return `
                                            <button onclick="playGame('${chapter}', '${u.unit}', '${encoded}')" class="text-left py-2 text-blue-500 hover:text-blue-700 font-medium flex items-center gap-2 group/btn">
                                                <span class="w-1.5 h-1.5 rounded-full bg-blue-300 group-hover/btn:bg-blue-600 transition-colors"></span>
                                                ${u.unit}
                                            </button>
                                        `;
                                    }).join('')}
                                </div>
                            </div>
                        </div>
                    `;
                });

                card.innerHTML = `
                    <div class="p-6 flex justify-between items-center bg-slate-50/30">
                        <div class="bg-white/80 backdrop-blur px-4 py-1.5 rounded-full text-xs font-black shadow-sm border border-slate-100 uppercase tracking-wider" style="color: ${info.color}">
                            ${info.grade}
                        </div>
                        <h2 class="text-xl font-extrabold text-slate-800 ltr-content">${bookName}</h2>
                    </div>
                    <div class="flex-grow">
                        ${accordionHtml}
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        function playGame(chapter, unit, encodedWords) {
            const words = decodeURIComponent(escape(atob(encodedWords)));
            sessionStorage.setItem('currentWords', `${chapter} - ${unit}\n${words}`);
            window.location.href = 'index.html?source=library';
        }

        window.onload = initLibrary;
    </script>
</body>
</html>
