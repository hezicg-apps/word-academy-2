<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Word Academy - Library</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        body { background-color: #f0f4f8; font-family: 'Segoe UI', sans-serif; }
        .library-container { display: flex; gap: 20px; justify-content: center; padding: 40px 20px; flex-wrap: wrap; }
        
        /* עיצוב הטורים */
        .book-column { 
            background: white; border-radius: 20px; border: 2px solid #e2e8f0; 
            width: 320px; min-height: 450px; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.05); 
        }
        .book-header { padding: 20px; text-align: center; color: white; font-weight: bold; font-size: 22px; }
        
        /* צבעים לפי כיתות/ספרים */
        .book-magical { background-color: #6366f1; } /* כיתה ה */
        .book-legendary { background-color: #f59e0b; } /* כיתה ד */
        .book-epic { background-color: #10b981; } /* כיתה ג */
        .book-grade6 { background-color: #ef4444; } /* כיתה ו - הוספתי צבע אדום */

        .units-list { padding: 15px; display: flex; flex-direction: column; gap: 12px; }

        /* עיצוב ה-Dropdown של היחידה */
        .unit-group { border: 1px solid #e2e8f0; border-radius: 12px; background: #f8fafc; }
        .unit-name { 
            padding: 12px; cursor: pointer; font-weight: bold; color: #1e293b; 
            display: flex; justify-content: space-between; align-items: center;
        }
        .unit-name:hover { background: #f1f5f9; }
        .unit-name::after { content: '▼'; font-size: 10px; transition: 0.3s; }
        .unit-group.open .unit-name::after { transform: rotate(180deg); }

        /* אזור הכפתורים בתוך היחידה */
        .parts-area { display: none; padding: 10px; background: white; border-top: 1px solid #e2e8f0; gap: 8px; flex-direction: column; }
        .unit-group.open .parts-area { display: flex; }

        .part-link { 
            background: #fff; border: 1px solid #3b82f6; color: #3b82f6; 
            padding: 8px; border-radius: 6px; text-align: center; cursor: pointer; 
            font-weight: bold; transition: 0.2s; text-decoration: none;
        }
        .part-link:hover { background: #3b82f6; color: white; }

        .loader { text-align: center; margin-top: 50px; font-size: 18px; color: #64748b; }
    </style>
</head>
<body>

<div class="header">
    <div id="user-display">שלום, מורה יקר!</div>
    <div class="header-left">
        <img src="logo.svg" alt="WA" class="logo-img">
        <h2 style="font-size:18px; color:#3b82f6; margin:0;">Word Academy</h2>
    </div>
</div>

<h1 style="text-align:center; margin-top:30px;">הספרייה הדיגיטלית שלי</h1>

<div id="loader" class="loader">מתחבר לגיליון הנתונים...</div>
<div class="library-container" id="library-content"></div>

<script>
    const sheetUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQTBLf3lCxJ0JcbeEc9nCB7eoyFKN98wIem2rDUYMBoup8Yw6kkv_T41BqwnILLBQXE5ibWV9HJAOzC/pub?output=csv';

    async function fetchData() {
        try {
            const response = await fetch(sheetUrl);
            const csv = await response.text();
            const lines = csv.split('\n').slice(1);
            
            const structure = {};

            lines.forEach(line => {
                const cols = line.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                if (cols.length < 4) return;

                const book = cols[0].trim().replace(/"/g, '');
                const unit = cols[1].trim().replace(/"/g, '');
                const part = cols[2].trim().replace(/"/g, '');
                const words = cols[3].trim().replace(/"/g, '').replace(/\\n/g, '\n');

                if (!structure[book]) structure[book] = {};
                if (!structure[book][unit]) structure[book][unit] = [];
                
                structure[book][unit].push({ name: part, data: words });
            });

            buildLibrary(structure);
            document.getElementById('loader').style.display = 'none';
        } catch (e) {
            console.error(e);
            document.getElementById('loader').innerText = "שגיאה בטעינת הנתונים מה-Sheets";
        }
    }

    function buildLibrary(data) {
        const container = document.getElementById('library-content');
        
        for (const book in data) {
            const col = document.createElement('div');
            col.className = 'book-column';
            
            // הגדרת צבע לפי שם הספר
            let colorClass = 'book-default';
            if (book.includes("Magical")) colorClass = 'book-magical';
            else if (book.includes("Legendary")) colorClass = 'book-legendary';
            else if (book.includes("Epic")) colorClass = 'book-epic';
            else if (book.includes("כיתה ו")) colorClass = 'book-grade6';

            col.innerHTML = `<div class="book-header ${colorClass}">${book}</div><div class="units-list" id="list-${book.replace(/\s/g, '')}"></div>`;
            container.appendChild(col);

            const list = document.getElementById(`list-${book.replace(/\s/g, '')}`);
            
            for (const unit in data[book]) {
                const group = document.createElement('div');
                group.className = 'unit-group';
                
                let partsHtml = '';
                data[book][unit].forEach(p => {
                    const encoded = btoa(unescape(encodeURIComponent(p.data)));
                    partsHtml += `<div class="part-link" onclick="play('${unit}', '${p.name}', '${encoded}')">${p.name}</div>`;
                });

                group.innerHTML = `
                    <div class="unit-name" onclick="this.parentElement.classList.toggle('open')">${unit}</div>
                    <div class="parts-area">${partsHtml}</div>
                `;
                list.appendChild(group);
            }
        }
    }

    function play(u, p, data) {
        const words = decodeURIComponent(escape(atob(data)));
        sessionStorage.setItem('currentWords', `${u} - ${p}\n${words}`);
        window.location.href = 'index.html?source=library';
    }

    window.onload = fetchData;
</script>
</body>
</html>
