<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Word Adventure</title>
    <link href="https://fonts.googleapis.com/css2?family=Comic+Neue:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #f8fafc; --navy: #1e3a8a; --blue: #2563eb; --accent: #facc15; --white: #ffffff; --green: #22c55e; --red: #ef4444; }
        body { font-family: 'Comic Neue', cursive; background: var(--bg); color: var(--navy); margin: 0; text-align: center; }
        
        /* Header קבוע לכל המסכים */
        .header { background: white; padding: 15px 25px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 6px rgba(0,0,0,0.05); position: sticky; top: 0; z-index: 1000; }
        .site-name { font-size: 28px; font-weight: 700; color: var(--blue); }
        .logo-img { height: 40px; display: block; }

        .container { max-width: 500px; margin: 20px auto; padding: 10px; }
        .card-box { background: white; padding: 25px; border-radius: 25px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); border: 2px solid #e2e8f0; }
        
        h3 { color: var(--blue); margin-top: 0; font-size: 24px; }
        .step-info { font-size: 14px; color: #64748b; margin-bottom: 10px; font-weight: bold; }

        /* כפתורים וריווח */
        .btn { background: var(--blue); color: white; border: none; padding: 15px; border-radius: 15px; font-size: 20px; font-weight: bold; width: 100%; cursor: pointer; transition: 0.2s; margin-bottom: 12px; font-family: inherit; }
        .btn-option { background: #f1f5f9; color: var(--navy); border: 2px solid #e2e8f0; margin-bottom: 18px; } /* ריווח מוגדל */
        .correct { background: var(--green) !important; color: white !important; border-color: var(--green); }
        .wrong { background: var(--red) !important; color: white !important; border-color: var(--red); }

        /* כרטיסיות */
        .flip-card { width: 280px; height: 180px; perspective: 1000px; margin: 20px auto; }
        .flip-card-inner { position: relative; width: 100%; height: 100%; transition: transform 0.6s; transform-style: preserve-3d; cursor: pointer; }
        .flip-card.flipped .flip-card-inner { transform: rotateY(180deg); }
        .card-face { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; display: flex; align-items: center; justify-content: center; border-radius: 20px; border: 4px solid var(--blue); font-size: 36px; font-weight: bold; background: white; box-sizing: border-box; }
        .card-back { transform: rotateY(180deg); color: var(--blue); background: #eff6ff; }

        /* 4 בשורה */
        .game-nav { display: flex; justify-content: space-between; align-items: center; width: 300px; margin: 10px auto; }
        .arrows-row { display: grid; grid-template-columns: repeat(7, 1fr); width: 300px; margin: 5px auto; }
        .arrow-item { cursor: pointer; color: var(--blue); font-size: 20px; font-weight: bold; padding: 5px; }
        
        .board { background: var(--navy); display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; padding: 8px; border-radius: 15px; width: 300px; margin: 0 auto; position: relative; overflow: hidden; height: 260px; }
        .cell { aspect-ratio: 1; background: #312e81; border-radius: 50%; z-index: 2; }
        
        /* אסימון נופל */
        .token { width: 34px; height: 34px; border-radius: 50%; position: absolute; transition: top 0.5s cubic-bezier(0.45, 0.05, 0.55, 0.95); z-index: 1; }
        .red-t { background: var(--red); box-shadow: inset 0 -3px rgba(0,0,0,0.2); }
        .yellow-t { background: var(--accent); box-shadow: inset 0 -3px rgba(0,0,0,0.2); }

        /* Modal שאלה */
        .modal { display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); align-items: center; justify-content: center; }
        .modal-content { background: white; padding: 25px; border-radius: 25px; width: 85%; max-width: 400px; }

        .hidden { display: none; }
        textarea { width: 100%; height: 200px; border-radius: 15px; padding: 15px; font-size: 20px; border: 2px solid #cbd5e1; resize: none; box-sizing: border-box; font-family: inherit; }
    </style>
</head>
<body>

<div class="header">
    <div class="site-name">Word Adventure</div>
    <img src="logo.svg" alt="Logo" class="logo-img" onerror="this.style.opacity='0'">
</div>

<div class="container">
    <div id="screen-input" class="card-box">
        <h3>יצירת רשימה חדשה ✨</h3>
        <textarea id="wordInput" placeholder="שם הרשימה&#10;Apple - תפוח&#10;Sun - שמש"></textarea>
        <button class="btn" onclick="initApp()">מתחילים ללמוד</button>
    </div>

    <div id="screen-cards" class="card-box hidden">
        <div class="step-info">זמן ללמוד! 🧠</div>
        <div class="flip-card" id="card-element" onclick="this.classList.toggle('flipped')">
            <div class="flip-card-inner">
                <div class="card-face">
                    <span id="card-eng"></span>
                </div>
                <div class="card-face card-back" id="card-heb"></div>
            </div>
        </div>
        <div style="display:flex; gap:10px;">
            <button class="btn" style="background:#94a3b8" onclick="nextCard(false)">עוד מעט אדע</button>
            <button class="btn" style="background:var(--green)" onclick="nextCard(true)">יודע!</button>
        </div>
    </div>

    <div id="screen-quiz" class="card-box hidden">
        <div class="step-info" id="quiz-count"></div>
        <h3>אתגר המילים 🏆</h3>
        <div id="quiz-word" style="font-size:36px; font-weight:bold; margin-bottom:25px; color:var(--blue);"></div>
        <div id="quiz-options"></div>
    </div>

    <div id="screen-summary" class="card-box hidden">
        <div style="display:flex; justify-content: space-between; font-size:14px; margin-bottom:15px; font-weight:bold;">
            <span onclick="location.reload()" style="color:var(--blue); cursor:pointer;">+ רשימה חדשה</span>
            <span style="color:var(--green); cursor:pointer;">שיתוף 🔗</span>
        </div>
        <h2>הציון שלך: <span id="final-score" style="color:var(--blue)">0</span>%</h2>
        <button id="btn-game" class="btn hidden" onclick="initGame()">מתחם המשחקים 🎮</button>
        <button class="btn btn-option" onclick="startQuiz()">תרגול נוסף לשיפור הציון</button>
    </div>

    <div id="screen-game" class="card-box hidden">
        <button class="btn" onclick="openGameQuestion()">שאלה חדשה ❓</button>
        
        <div class="game-nav">
            <span onclick="showScreen('screen-summary')" style="color:var(--red); cursor:pointer; font-weight:bold;">❌ יציאה</span>
            <span style="font-weight:bold;">תור: <div id="turn-dot" style="width:15px; height:15px; border-radius:50%; display:inline-block; background:var(--red); vertical-align:middle;"></div></span>
        </div>

        <div class="arrows-row" id="arrow-row"></div>
        <div class="board" id="board-container"></div>
    </div>
</div>

<div id="q-modal" class="modal">
    <div class="modal-content">
        <div id="modal-eng" style="font-size:28px; font-weight:bold; margin-bottom:20px; color:var(--blue);"></div>
        <div id="modal-options"></div>
    </div>
</div>

<script>
    let state = {
        words: [], queue: [], currentIdx: 0, score: 0,
        board: Array(6).fill(null).map(() => Array(7).fill(null)),
        turn: 1, canDrop: false, firstTry: true
    };

    function showScreen(id) {
        document.querySelectorAll('.card-box').forEach(s => s.classList.add('hidden'));
        document.getElementById(id).classList.remove('hidden');
    }

    function initApp() {
        const lines = document.getElementById('wordInput').value.trim().split('\n');
        state.words = lines.slice(1).map(l => {
            const [e, h] = l.split('-').map(s => s.trim());
            return { eng: e, heb: h };
        });
        state.queue = [...state.words];
        updateCard();
        showScreen('screen-cards');
    }

    function updateCard() {
        if(state.queue.length === 0) return startQuiz();
        document.getElementById('card-element').classList.remove('flipped');
        document.getElementById('card-eng').innerText = state.queue[0].eng;
        document.getElementById('card-heb').innerText = state.queue[0].heb;
    }

    function nextCard(known) {
        const w = state.queue.shift();
        if(!known) state.queue.push(w);
        updateCard();
    }

    function startQuiz() {
        state.currentIdx = 0; state.score = 0; state.firstTry = true;
        showScreen('screen-quiz');
        renderQuiz();
    }

    function renderQuiz() {
        const q = state.words[state.currentIdx];
        document.getElementById('quiz-count').innerText = `מילה ${state.currentIdx+1} מתוך ${state.words.length}`;
        document.getElementById('quiz-word').innerText = q.eng;
        
        const opts = [q.heb, ...state.words.filter(w=>w.heb!==q.heb).map(w=>w.heb)].sort(()=>0.5-Math.random()).slice(0,4);
        const container = document.getElementById('quiz-options');
        container.innerHTML = '';
        
        opts.forEach(o => {
            const b = document.createElement('button');
            b.className = 'btn btn-option';
            b.innerText = o;
            b.onclick = () => {
                if(o === q.heb) {
                    b.classList.add('correct');
                    if(state.firstTry) state.score++;
                    setTimeout(() => {
                        state.currentIdx++; state.firstTry = true;
                        if(state.currentIdx < state.words.length) renderQuiz();
                        else finishQuiz();
                    }, 800);
                } else {
                    state.firstTry = false;
                    b.classList.add('wrong');
                    Array.from(container.children).forEach(btn => {
                        if(btn.innerText === q.heb) btn.classList.add('correct');
                    });
                    setTimeout(() => {
                        Array.from(container.children).forEach(btn => btn.classList.remove('wrong', 'correct'));
                    }, 1200);
                }
            };
            container.appendChild(b);
        });
    }

    function finishQuiz() {
        const pct = Math.round((state.score / state.words.length) * 100);
        document.getElementById('final-score').innerText = pct;
        if(pct >= 70) document.getElementById('btn-game').classList.remove('hidden');
        showScreen('screen-summary');
    }

    // --- 4 בשורה ---
    function initGame() {
        showScreen('screen-game');
        state.board = Array(6).fill(null).map(() => Array(7).fill(null));
        document.getElementById('board-container').innerHTML = '';
        for(let i=0; i<42; i++) {
            const c = document.createElement('div'); c.className = 'cell';
            document.getElementById('board-container').appendChild(c);
        }
        const arrows = document.getElementById('arrow-row');
        arrows.innerHTML = '';
        for(let i=0; i<7; i++) {
            const a = document.createElement('div'); a.className = 'arrow-item';
            a.innerHTML = `▼<br>${i+1}`;
            a.onclick = () => dropToken(i);
            arrows.appendChild(a);
        }
    }

    function openGameQuestion() {
        const q = state.words[Math.floor(Math.random()*state.words.length)];
        document.getElementById('modal-eng').innerText = q.eng;
        const container = document.getElementById('modal-options');
        container.innerHTML = '';
        const opts = [q.heb, ...state.words.filter(w=>w.heb!==q.heb).map(w=>w.heb)].sort(()=>0.5-Math.random()).slice(0,4);
        
        opts.forEach(o => {
            const b = document.createElement('button'); b.className = 'btn btn-option'; b.innerText = o;
            b.onclick = () => {
                if(o === q.heb) {
                    b.classList.add('correct');
                    setTimeout(() => {
                        document.getElementById('q-modal').style.display = 'none';
                        state.canDrop = true;
                    }, 600);
                } else { b.classList.add('wrong'); }
            };
            container.appendChild(b);
        });
        document.getElementById('q-modal').style.display = 'flex';
    }

    function dropToken(c) {
        if(!state.canDrop) return;
        let r = -1;
        for(let i=5; i>=0; i--) { if(!state.board[i][c]) { r = i; break; } }
        if(r === -1) return;

        state.board[r][c] = state.turn;
        const t = document.createElement('div');
        t.className = `token ${state.turn === 1 ? 'red-t' : 'yellow-t'}`;
        t.style.left = (c * 42.8 + 8) + "px"; // מיקום מדויק בעמודה
        t.style.top = "-40px";
        document.getElementById('board-container').appendChild(t);

        setTimeout(() => {
            t.style.top = (r * 42.8 + 8) + "px"; // נפילה לתא הנכון
        }, 50);

        state.canDrop = false;
        state.turn = state.turn === 1 ? 2 : 1;
        document.getElementById('turn-dot').style.background = state.turn === 1 ? 'var(--red)' : 'var(--accent)';
    }
</script>
</body>
</html>
