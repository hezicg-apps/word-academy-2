<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Word Academy - Adventure</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Andika&family=Heebo:wght@400;700;900&family=Varela+Round&display=swap" rel="stylesheet">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        /* הגדרות כלליות */
        body {
            font-family: 'Heebo', sans-serif;
            transition: background-color 0.3s ease;
            margin: 0;
            background-color: #f8fafc;
        }

        /* הגדרה קפדנית לאנגלית: ה-a תמיד תהיה בכתב יד (Andika) */
        .eng-text, [lang="en"] { 
            font-family: 'Andika', sans-serif !important; 
            direction: ltr;
            display: inline-block;
        }

        /* מצב לילה */
        body.night-mode {
            background-color: #0f172a !important;
            color: #f1f5f9 !important;
        }
        
        .night-mode .bg-white { background-color: #1e293b !important; color: white !important; }
        .night-mode .text-slate-800 { color: #f1f5f9 !important; }
        .night-mode .border-slate-100 { border-color: #334155 !important; }

        /* אנימציית טעינה */
        .dot { animation: glow 1.5s infinite ease-in-out; }
        .dot:nth-child(2) { animation-delay: 0.5s; }
        .dot:nth-child(3) { animation-delay: 1s; }
        @keyframes glow { 0%, 100% { opacity: 0.3; transform: scale(0.8); } 50% { opacity: 1; transform: scale(1.1); } }
    </style>
</head>
<body class="min-h-screen">

    <div id="app"></div>

    <div id="loading-screen" class="fixed inset-0 bg-white flex flex-col items-center justify-center z-50">
        <div class="flex gap-2 mb-4">
            <div class="dot w-4 h-4 bg-blue-600 rounded-full"></div>
            <div class="dot w-4 h-4 bg-blue-500 rounded-full"></div>
            <div class="dot w-4 h-4 bg-blue-400 rounded-full"></div>
        </div>
        <p class="font-black text-blue-600">מעלה את ההרפתקה...</p>
    </div>

    <script src="main.js"></script>
</body>
</html>
