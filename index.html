<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Word Academy</title>
    <link href="https://fonts.googleapis.com/css2?family=Comic+Neue:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #f8fafc; --navy: #1e3a8a; --blue: #2563eb; --green: #22c55e; --red: #ef4444; --accent: #facc15; }
        body { font-family: 'Comic Neue', cursive; background: var(--bg); color: var(--navy); margin: 0; padding: 0; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
        
        /* Header Fix based on your photos */
        .header { background: white; padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; }
        .header-right { display: flex; align-items: center; gap: 8px; font-weight: bold; color: var(--blue); }
        .logo-dots { display: flex; gap: 3px; }
        .dot { width: 8px; height: 8px; border-radius: 50%; }
        .wa-tag { background: var(--blue); color: white; padding: 2px 6px; border-radius: 6px; font-size: 12px; }

        .container { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; align-items: center; }
        .card-box { background: white; padding: 20px; border-radius: 25px; border: 1px solid #e2e8f0; width: 100%; max-width: 400px; position: relative; box-shadow: 0 4px 10px rgba(0,0,0,0.03); }

        textarea { width: 100%; height: 150px; border-radius: 15px; border: 2px solid #000; padding: 15px; font-family: 'Comic Neue', cursive; font-size: 16px; box-sizing: border-box; outline: none; direction: ltr; }

        .btn { border: none; padding: 15px; border-radius: 20px; font-size: 18px; font-weight: bold; width: 100%; cursor: pointer; margin-bottom: 10px; font-family: 'Comic Neue', cursive; }
        .btn-blue { background: var(--blue); color: white; }
        .btn-green { background: var(--green); color: white; }
        .btn-light { background: #f1f5f9; color: var(--navy); }
        
        /* Connect 4 Design */
        .c4-grid { background: #1e3a8a; padding: 8px; border-radius: 12px; display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
        .cell { aspect-ratio: 1; background: #ffffff33; border-radius: 50%; display: flex; align-items: center; justify-content: center; position: relative; }
        .cell.red::after { content: ''; width: 85%; height: 85%; background: var(--red); border-radius: 50%; }
        .cell.yellow::after { content: ''; width: 85%; height: 85%; background: var(--accent); border-radius: 50%; }
        .arrows { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; margin-bottom: 5px; }
        .arrow { color: var(--blue); font-size: 12px; cursor: pointer; }

        .close-btn { position: absolute; top: 15px; left: 15px; font-size: 20px; cursor: pointer; color: #64748b; }
        .hidden { display: none; }

        /* Modal Overlays */
        #custom-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: none; align-items: center; justify-content: center; z-index: 999; }
        .modal-content { background: white; padding: 25px; border-radius: 25px; width: 85%; max-width: 320px; text-align: center; border-top: 8px solid var(--blue); }
    </style>
</head>
<body>

<div class="header">
    <div style="font-size:14px; color:#64748b;">שלום, אורח/ת!</div>
    <div class="header-right">
        Word Academy
        <div class="logo-dots">
            <div class="dot" style="background:var(--blue)"></div>
            <div class="dot" style="background:var(--accent)"></div>
            <div class="dot" style="background:var(--red)"></div>
        </div>
        <div class="wa-tag">WA</div>
    </div>
</div>

<div class="container">
    <div id="screen-input" class="card-box">
        <h2 style="color:var(--navy); margin-top:0;">מה לומדים היום?</h2>
        <textarea id="wordInput" placeholder="Unit Name&#10;Apple - תפוח..."></textarea>
        <button class="btn btn-blue" onclick="initApp()">יוצאים לדרך</button>
        <button id="btn-share-list" class="btn btn-light hidden" onclick="shareList()">שתף רשימת מילים 📋</button>
    </div>

    <div id="screen-quiz" class="card-box hidden">
        <div id="q-progress" style="font-size:12px; margin-bottom:10px;"></div>
        <div id="q-eng" style="font-size:28px; font-weight:bold; margin-bottom:20px; border:2px solid var(--blue); padding:30px; border-radius:20px; color:var(--navy);"></div>
        <div id="q-options"></div>
    </div>

    <div id="screen-summary" class="card-box hidden">
        <h2 style="margin:0;">הציון שלך:</h2>
        <div id="final-score" style="font-size:64px; font-weight:bold; color:var(--blue); margin:10px 0;">0%</div>
        <button class="btn btn-green" onclick="shareScore()">שתף הישג בוואטסאפ 📱</button>
        <div id="unlock-msg" style="color:var(--green); margin:10px 0; font-weight:bold;"></div>
        <button id="btn-c4" class="btn btn-blue hidden" onclick="startC4()">🔴 למתחם המשחקים (4 בשורה)</button>
        <button id="btn-mem" class="btn btn-blue hidden" style="background:var(--accent); color:var(--navy);" onclick="startMemory()">🧠 משחק הזיכרון</button>
        <button class="btn btn-light" onclick="restartQuiz()">תרגול חוזר</button>
    </div>

    <div id="screen-c4" class="card-box hidden">
        <span class="close-btn" onclick="showScreen('screen-summary')">✖</span>
        <div id="c4-status" style="margin-bottom:10px; font-weight:bold;">תור אדום</div>
        <button id="c4-ask-btn" class="btn btn-blue" onclick="c4Ask()">לחץ לשאלה</button>
        <div class="arrows" id="c4-arrows"></div>
        <div class="c4-grid" id="c4-board"></div>
    </div>

    <div id="screen-mem" class="card-box hidden">
        <span class="close-btn" onclick="showScreen('screen-summary')">✖</span>
        <h3 style="margin-top:0;">משחק הזיכרון</h3>
        <div id="mem-grid" style="display:grid; grid-template-columns:repeat(3,1fr); gap:8px;"></div>
    </div>
</div>

<div id="custom-modal">
    <div class="modal-content">
        <div id="modal-body" style="font-size:18px; margin-bottom:20px;"></div>
        <button class="btn btn-blue" onclick="closeModal()">הבנתי!</button>
    </div>
</div>

<script>
    let state = { words: [], unit: '', qIdx: 0, qCorrect: 0, c4Turn: 'red', board: [], canDrop: false, memFlipped: [], memMatched: 0 };

    function showScreen(id) {
        document.querySelectorAll('.container > div').forEach(d => d.classList.add('hidden'));
        document.getElementById(id).classList.remove('hidden');
    }

    function initApp() {
        const val = document.getElementById('wordInput').value.trim();
        const lines = val.split('\n');
        if(lines.length < 2) return alert("הכנס שם יחידה ומילים");
        state.unit = lines[0];
        state.words = lines.slice(1).filter(l => l.includes('-')).map(l => {
            const p = l.split('-');
            return { eng: p[0].trim(), heb: p[1].trim() };
        });
        document.getElementById('btn-share-list').classList.remove('hidden');
        restartQuiz();
    }

    function restartQuiz() {
        state.qIdx = 0; state.qCorrect = 0;
        showScreen('screen-quiz');
        renderQuiz();
    }

    function renderQuiz() {
        if(state.qIdx >= state.words.length) return endQuiz();
        const q = state.words[state.qIdx];
        document.getElementById('q-progress').innerText = `מילה ${state.qIdx+1} מתוך ${state.words.length}`;
        document.getElementById('q-eng').innerText = q.eng;
        const opts = [q.heb, ...state.words.filter(x => x.heb !== q.heb).map(x => x.heb)].slice(0,4).sort(() => Math.random()-0.5);
        const cont = document.getElementById('q-options'); cont.innerHTML = '';
        opts.forEach(o => {
            const b = document.createElement('button');
            b.className = 'btn btn-light'; b.style.border = '1px solid #cbd5e1'; b.innerText = o;
            b.onclick = () => {
                if(o === q.heb) { b.classList.add('btn-green'); state.qCorrect++; }
                else { b.style.background = 'var(--red)'; b.style.color = 'white'; }
                setTimeout(() => { state.qIdx++; renderQuiz(); }, 800);
            };
            cont.appendChild(b);
        });
    }

    function endQuiz() {
        const score = Math.round((state.qCorrect/state.words.length)*100);
        document.getElementById('final-score').innerText = score + '%';
        const ok = score >= 70;
        document.getElementById('unlock-msg').innerText = ok ? "כל הכבוד! המשחקים פתוחים." : "🔓 צבור 70% כדי לפתוח משחקים";
        document.getElementById('btn-c4').classList.toggle('hidden', !ok);
        document.getElementById('btn-mem').classList.toggle('hidden', !ok);
        showScreen('screen-summary');
    }

    // Connect 4 Logic
    function startC4() {
        state.board = Array(6).fill(null).map(() => Array(7).fill(null));
        state.c4Turn = 'red'; state.canDrop = false;
        showScreen('screen-c4');
        drawC4();
    }

    function drawC4() {
        const b = document.getElementById('c4-board'); b.innerHTML = '';
        const a = document.getElementById('c4-arrows'); a.innerHTML = '';
        for(let i=0; i<7; i++) {
            const arrow = document.createElement('div'); arrow.className = 'arrow'; arrow.innerHTML = '▼';
            arrow.onclick = () => dropToken(i); a.appendChild(arrow);
        }
        for(let r=0; r<6; r++) {
            for(let c=0; c<7; c++) {
                const d = document.createElement('div'); d.className = `cell ${state.board[r][c] || ''}`;
                b.appendChild(d);
            }
        }
        document.getElementById('c4-status').innerText = `תור ${state.c4Turn === 'red' ? 'אדום' : 'צהוב'}`;
    }

    function c4Ask() {
        const q = state.words[Math.floor(Math.random()*state.words.length)];
        const opts = [q.heb, ...state.words.filter(x => x.heb !== q.heb).map(x => x.heb)].slice(0,2).sort(() => Math.random()-0.5);
        let html = `<div style="font-weight:bold; margin-bottom:10px;">${q.eng}</div>`;
        opts.forEach(o => {
            html += `<button class="btn btn-light" onclick="checkC4Ans(this,'${o}','${q.heb}')">${o}</button>`;
        });
        openModal(html);
    }

    function checkC4Ans(btn, sel, cor) {
        if(sel === cor) {
            btn.classList.add('btn-green');
            state.canDrop = true;
            setTimeout(() => { closeModal(); showToast("נכון! בחר טור 👇"); }, 600);
        } else {
            btn.style.background = 'var(--red)'; btn.style.color = 'white';
            state.c4Turn = state.c4Turn === 'red' ? 'yellow' : 'red';
            setTimeout(() => { closeModal(); drawC4(); }, 800);
        }
    }

    function dropToken(c) {
        if(!state.canDrop) return;
        for(let r=5; r>=0; r--) {
            if(!state.board[r][c]) {
                state.board[r][c] = state.c4Turn;
                state.canDrop = false;
                state.c4Turn = state.c4Turn === 'red' ? 'yellow' : 'red';
                drawC4(); return;
            }
        }
    }

    // Helpers
    function shareList() {
        let msg = `*רשימת מילים: ${state.unit}*%0A%0A`;
        state.words.forEach(w => msg += `${w.eng} - ${w.heb}%0A`);
        window.open(`https://wa.me/?text=${msg}`);
    }

    function shareScore() {
        const msg = `סיימתי את יחידת הלימוד *${state.unit}* ב-Word Academy בציון *${state.qCorrect}/${state.words.length}*! 🏆`;
        window.open(`https://wa.me/?text=${encodeURIComponent(msg)}`);
    }

    function openModal(html) { document.getElementById('modal-body').innerHTML = html; document.getElementById('custom-modal').style.display = 'flex'; }
    function closeModal() { document.getElementById('custom-modal').style.display = 'none'; }
    function showToast(m) { alert(m); } // Simplified for now to ensure action
    function startMemory() { alert("משחק הזיכרון בטעינה..."); } // Placeholder for brevity
</script>
</body>
</html>
