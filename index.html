<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Word Academy</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Comic+Neue:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>

<div class="header">
    <div id="user-display">שלום, אורח/ת!</div>
    <div class="header-left">
        <img src="logo.png" alt="WA" class="logo-img">
        <h2 style="font-size:18px; color:var(--blue); margin:0;">Word Academy</h2>
    </div>
</div>

<div class="container">
    <div id="screen-input" class="card-box">
        <h2 style="margin-top:0;">מה לומדים היום? ✨</h2>
        <textarea id="wordInput" placeholder="Unit Name&#10;Apple - תפוח&#10;Sun - שמש..."></textarea>
        <button class="btn" onclick="initApp()">יוצאים לדרך</button>
    </div>

    <div id="screen-quiz" class="card-box hidden">
        <div id="quiz-unit-display" style="font-weight:bold; color:var(--blue); margin-bottom:5px;"></div>
        <div id="quiz-progress" style="font-size:14px; margin-bottom:15px; color:#64748b;"></div>
        <div style="font-size:36px; font-weight:bold; margin-bottom:25px; display:flex; align-items:center; justify-content:center; gap:15px;">
            <span id="quiz-eng"></span>
            <button onclick="speak('quiz-eng')" style="background:none; border:none; font-size:28px; cursor:pointer;">🔊</button>
        </div>
        <div id="quiz-options"></div>
    </div>

    <div id="screen-summary" class="card-box hidden">
        <div style="display:flex; justify-content:space-between; margin-bottom:15px;">
            <button onclick="location.href='https://word-academy-8b91d.web.app/'" style="background:none; border:none; font-size:24px; cursor:pointer;">🏠</button>
            <button onclick="shareList()" style="background:none; border:none; font-size:24px; color:var(--blue); cursor:pointer;">🔗 שתף רשימה</button>
        </div>
        <h2 style="margin:0;">הציון שלך:</h2>
        <div id="final-score" style="font-size:64px; font-weight:bold; color:var(--blue); margin:10px 0;">0%</div>
        <button class="btn" style="background:var(--green)" onclick="shareAchievement()">שתף הישג בוואטסאפ 📱</button>
        
        <div id="game-lock" style="margin-top:20px; padding:15px; border:2px dashed #cbd5e1; border-radius:15px;">
            <div id="lock-msg">🔓 המשחקים ייפתחו ב-70% הצלחה</div>
            <div style="display:flex; gap:10px; margin-top:10px;">
                <button id="btn-c4" class="btn" onclick="startC4()" disabled>4 בשורה 🔴</button>
                <button id="btn-mem" class="btn" onclick="startMemory()" disabled style="background:var(--navy)">הזיכרון 🧠</button>
            </div>
        </div>
        <button class="btn" style="background:none; border:2px solid var(--blue); color:var(--blue); margin-top:20px;" onclick="restartQuiz()">🔄 תרגול חוזר</button>
    </div>

    <div id="screen-c4" class="card-box hidden">
        <div style="text-align:left;"><span onclick="showScreen('screen-summary')" style="cursor:pointer; font-weight:bold;">✖ סגור</span></div>
        <button id="c4-turn-btn" class="btn" onclick="c4Ask()"></button>
        <div class="board" id="c4-board" style="margin-top:20px;"></div>
    </div>

    <div id="screen-memory" class="card-box hidden">
        <div style="text-align:left; margin-bottom:10px;"><span onclick="showScreen('screen-summary')" style="cursor:pointer; font-weight:bold;">✖ סגור</span></div>
        <div id="memory-grid" class="memory-grid"></div>
    </div>
</div>

<div id="msg-modal" class="modal">
    <div class="modal-content">
        <div id="msg-stripe" class="modal-stripe"></div>
        <div id="msg-body" class="modal-body"></div>
        <button id="modal-close-btn" class="btn" onclick="closeMsg()" style="width:80%; margin: 10px auto 20px; display:block;">סגור</button>
    </div>
</div>

<script src="js/main.js"></script>
<script src="js/connect4.js"></script>
<script src="js/memory.js"></script>
</body>
</html>
