<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Word Academy</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* עיצוב לוח היחידות - 3 עמודות */
        .units-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            width: 100%;
            max-width: 1200px;
            margin: 20px auto;
            padding: 0 15px;
        }

        .column-card {
            background: #f8fafc;
            border-radius: 20px;
            border-top: 8px solid var(--blue);
            padding: 20px;
            box-shadow: var(--shadow);
            min-height: 400px;
        }

        .column-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .level-tag {
            background: #e0f2fe;
            color: var(--blue);
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: bold;
        }

        .unit-item {
            background: white;
            margin-bottom: 10px;
            padding: 12px 15px;
            border-radius: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            transition: transform 0.2s;
            border: 1px solid #e2e8f0;
        }

        .unit-item:hover {
            transform: scale(1.02);
            border-color: var(--blue);
        }

        .unit-name { font-weight: bold; color: #1e293b; }
        
        /* הסתרת אלמנטים בזמן מבחן */
        .hidden { display: none !important; }

        .teacher-login-btn {
            background: #f1f5f9;
            border: 1px solid #cbd5e1;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 13px;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="header">
    <div class="header-right">
        <button class="teacher-login-btn" onclick="showScreen('screen-input')">כניסת מורה</button>
    </div>
    <div class="header-left" onmousedown="startPress()" ontouchstart="startPress()" onmouseup="endPress()" ontouchend="endPress()">
        <img src="logo.svg" alt="WA" class="logo-img">
        <h2 style="font-size:18px; color:var(--blue); margin:0;">Word Academy</h2>
    </div>
</div>

<div id="main-content">
    <div id="screen-lobby" class="units-grid">
        <div class="column-card" id="col-Magical">
            <div class="column-header"><h3>Magical</h3> <span class="level-tag">כיתה ה'</span></div>
            <div class="units-list"></div>
        </div>
        <div class="column-card" id="col-Legendary">
            <div class="column-header"><h3>Legendary</h3> <span class="level-tag">כיתה ד'</span></div>
            <div class="units-list"></div>
        </div>
        <div class="column-card" id="col-Epic">
            <div class="column-header"><h3>Epic</h3> <span class="level-tag">כיתה ג'</span></div>
            <div class="units-list"></div>
        </div>
    </div>

    <div id="screen-input" class="container hidden">
        <div class="card-box">
            <h3>הזנה מהירה</h3>
            <textarea id="wordInput" placeholder="שם היחידה&#10;Apple - תפוח..."></textarea>
            <button class="btn" onclick="initApp()">יוצאים לדרך</button>
            <button class="btn" style="background:none; color:var(--blue);" onclick="showScreen('screen-lobby')">חזרה ללוח היחידות</button>
        </div>
    </div>

    <div class="container">
        <div id="screen-quiz" class="card-box hidden">
            <div id="quiz-header" style="display:flex; justify-content:space-between; width:100%; margin-bottom:15px;">
                <span id="quiz-unit-display"></span>
                <span id="quiz-progress"></span>
            </div>
            <div class="question-card">
                <div id="quiz-eng" style="font-size:32px; font-weight:bold;"></div>
                <button class="audio-btn" onclick="speak(document.getElementById('quiz-eng').innerText)">🔊 הקשיבו</button>
            </div>
            <div id="quiz-options" class="options-grid"></div>
        </div>

        <div id="screen-summary" class="card-box hidden">
            <h2 id="final-score" style="font-size:48px;"></h2>
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px; width:100%;">
                <button id="btn-c4" class="btn" onclick="startC4()" disabled>4 בשורה</button>
                <button id="btn-mem" class="btn" onclick="startMemory()" disabled>זיכרון</button>
            </div>
            <button class="btn" onclick="location.reload()" style="margin-top:15px; background:white; color:var(--blue); border:2px solid var(--blue);">חזרה לתפריט</button>
        </div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-firestore-compat.js"></script>
<script src="js/main.js"></script>
<script src="js/connect4.js"></script>
<script src="js/memory.js"></script>

<script>
    // פונקציית טעינת היחידות מה-Firebase לדף הבית
    async function loadLobby() {
        const snapshot = await db.collection("units").get();
        snapshot.forEach(doc => {
            const data = doc.data();
            const level = data.level || "Epic"; // ברירת מחדל אם שכחנו
            const listElement = document.querySelector(`#col-${level} .units-list`);
            
            if (listElement) {
                const item = document.createElement('div');
                item.className = 'unit-item';
                item.innerHTML = `
                    <span class="unit-name">${data.title}</span>
                    <span style="color:#94a3b8; font-size:12px;">◀</span>
                `;
                item.onclick = () => {
                    state.unit = data.title;
                    state.words = data.words;
                    restartQuiz();
                };
                listElement.appendChild(item);
            }
        });
    }

    // הפעלה בטעינה
    window.addEventListener('load', loadLobby);

    function showScreen(id) {
        document.getElementById('screen-lobby').classList.add('hidden');
        document.getElementById('screen-input').classList.add('hidden');
        document.getElementById('screen-quiz').classList.add('hidden');
        document.getElementById('screen-summary').classList.add('hidden');
        document.getElementById(id).classList.remove('hidden');
    }
</script>
</body>
</html>
