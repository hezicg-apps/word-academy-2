<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Word Academy - Adventure</title>
    
    <link rel="icon" type="image/png" href="favicon.png?v=2">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-firestore-compat.js"></script>

    <style>
        /* טעינת הגופנים הדידקטיים שביקשת */
        @import url('https://fonts.googleapis.com/css2?family=Andika&family=Varela+Round&display=swap');
        
        body { 
            font-family: 'Varela Round', sans-serif; 
            transition: background-color 0.3s; 
            overflow-x: hidden; 
            touch-action: manipulation; 
        }
        
        /* הגדרה קפדנית לאנגלית: ה-a תמיד תהיה בכתב יד */
        .eng-text, .ltr-content, [lang="en"] { 
            font-family: 'Andika', sans-serif !important; 
        }

        button, .card-inner, [onclick] {
            cursor: pointer;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
        }

        .dot { animation: glow 1.5s infinite ease-in-out; }
        .dot:nth-child(2) { animation-delay: 0.5s; }
        .dot:nth-child(3) { animation-delay: 1s; }
        @keyframes glow { 0%, 100% { opacity: 0.3; transform: scale(0.8); } 50% { opacity: 1; transform: scale(1.1); } }

        .night-mode { background-color: #1a202c !important; color: #facc15 !important; }
    </style>
    <link rel="stylesheet" href="style.css?v=2">
</head>
<body class="bg-slate-50 min-h-screen flex flex-col items-center">

<header class="w-full bg-white shadow-sm py-4 px-6 flex justify-between items-center sticky top-0 z-50">
    <div class="flex items-center gap-2">
        <h1 class="text-xl font-black text-slate-800">Word Academy</h1>
    </div>
    <div class="flex gap-2">
        <button onclick="toggleNightMode()" class="p-2 rounded-full hover:bg-slate-100" title="מצב לילה">🌓</button>
        <button onclick="resetToInput()" class="p-2 rounded-full hover:bg-slate-100" title="איפוס">
            <img id="logo-img" src="logo.svg" class="w-8 h-8 object-contain" alt="Logo">
        </button>
    </div>
</header>

    <main id="app" class="w-full max-w-md"></main>

    <div id="loading-screen" class="flex flex-col items-center justify-center mt-20">
        <div class="flex gap-2 mb-4">
            <div class="dot w-4 h-4 bg-blue-600 rounded-full"></div>
            <div class="dot w-4 h-4 bg-blue-500 rounded-full"></div>
            <div class="dot w-4 h-4 bg-blue-400 rounded-full"></div>
        </div>
        <p class="font-black text-blue-600">מעלה את ההרפתקה...</p>
    </div>

    <script src="main.js?v=2"></script>

    <script>
        function resetToInput() {
            if(confirm("האם לאפס את הרשימה ולהזין מילים חדשות?")) {
                state.words = [];
                state.screen = 'input';
                render();
            }
        }
    </script>
</body>
</html>
