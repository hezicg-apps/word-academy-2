<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Word Academy</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div class="header">
        <div class="header-left">
            <img src="logo.svg" alt="WA" class="logo-img">
            <span style="font-weight: bold; color: var(--blue);">Word Academy</span>
        </div>
        <div style="font-size: 12px;">שלום, אורח/ת!</div>
    </div>

    <div class="container">
        <div id="screen-setup">
            <div class="card-box">
                <h2 style="margin-top:0;">✨ מה לומדים היום?</h2>
                <textarea id="wordInput" placeholder="שם היחידה&#10;Apple - תפוח&#10;Sun - שמש..."></textarea>
                <button class="btn" onclick="initApp()">יוצאים לדרך</button>
            </div>
        </div>

        <div id="screen-quiz" class="hidden">
            <div class="card-box">
                <div id="quiz-unit-display" style="font-weight: bold; color: var(--blue); margin-bottom: 5px;"></div>
                <div id="quiz-progress" style="font-size: 14px; color: #64748b; margin-bottom: 15px;"></div>
                <div id="quiz-eng" style="font-size: 32px; font-weight: bold; margin-bottom: 20px; cursor: pointer;" onclick="speak('quiz-eng')"></div>
                <div id="quiz-options"></div>
            </div>
        </div>

        <div id="screen-summary" class="hidden">
            <div class="card-box">
                <div style="font-size: 18px;">הציון שלך:</div>
                <div id="final-score" style="font-size: 64px; font-weight: bold; color: var(--blue); margin: 10px 0;"></div>
                <button class="btn" style="background: var(--green);" onclick="shareAchievement()">שתף הישג בוואטסאפ</button>
                <button class="btn" style="background: white; color: var(--blue); border: 2px solid var(--blue);" onclick="shareList()">שתף רשימה 🔗</button>
            </div>
            
            <div class="card-box" style="border-style: dashed;">
                <div style="font-size: 14px; margin-bottom: 10px;">כל הכבוד! המשחקים פתוחים:</div>
                <div style="display: flex; gap: 10px;">
                    <button id="btn-c4" class="btn" style="flex: 1; background: var(--blue);" onclick="startConnect4()">🔴 4 בשורה</button>
                    <button id="btn-mem" class="btn" style="flex: 1; background: var(--navy);" onclick="startMemory()">🧠 הזיכרון</button>
                </div>
            </div>
            <button class="btn" style="background: none; color: var(--blue); text-decoration: underline;" onclick="location.reload()">🔄 תרגול חוזר</button>
        </div>

        <div id="screen-c4" class="hidden">
            <div id="c4-status" style="margin-bottom: 10px; padding: 10px; border-radius: 10px; color: white; font-weight: bold;"></div>
            <div class="board" id="c4-board"></div>
            <button class="btn" style="background: none; color: var(--navy);" onclick="showScreen('screen-summary')">🏠 חזרה</button>
        </div>

        <div id="screen-memory" class="hidden">
            <div id="memory-moves"></div>
            <div class="memory-grid" id="memory-grid"></div>
            <button class="btn" style="background: none; color: var(--navy);" onclick="showScreen('screen-summary')">🏠 חזרה</button>
        </div>
    </div>

    <div id="msg-modal" class="modal">
        <div class="modal-content">
            <div id="msg-stripe" class="modal-stripe"></div>
            <div id="msg-body" class="modal-body"></div>
            <div style="padding: 10px; display: flex; flex-direction: column; gap: 10px;">
                <button class="btn" onclick="location.reload()">משחק חדש</button>
                <button class="btn" style="background: #e2e8f0; color: var(--navy);" onclick="closeMsg()">סגור</button>
            </div>
        </div>
    </div>

    <script src="js/main.js"></script>
    <script src="js/connect4.js"></script>
    <script src="js/memory.js"></script>
</body>
</html>
