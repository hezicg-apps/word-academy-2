<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Word Adventure - Professional Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Comic+Neue:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #f8fafc; --navy: #1e3a8a; --blue: #2563eb; --accent: #facc15; --white: #ffffff; --green: #22c55e; --red: #ef4444; }
        body { font-family: 'Comic Neue', cursive; background: var(--bg); color: var(--navy); margin: 0; text-align: center; }
        
        .header { background: white; padding: 15px 25px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        .site-name { font-size: 32px; font-weight: 700; color: var(--blue); letter-spacing: -1px; }
        .logo { height: 45px; }

        .container { max-width: 500px; margin: 20px auto; padding: 15px; }
        .card-box { background: white; padding: 25px; border-radius: 24px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); border: 2px solid #e2e8f0; min-height: 350px; display: flex; flex-direction: column; justify-content: center; align-items: center; position: relative;}
        
        .btn { background: var(--blue); color: white; border: none; padding: 15px; border-radius: 16px; font-size: 18px; font-weight: bold; width: 100%; cursor: pointer; margin-top: 10px; font-family: inherit; transition: 0.3s; }
        .btn:active { transform: scale(0.98); }
        .btn-green { background: var(--green); }
        .btn-red { background: var(--red); }
        .btn-secondary { background: #f1f5f9; color: var(--navy); border: 1px solid #e2e8f0; }
        .btn-locked { background: #cbd5e1; cursor: not-allowed; opacity: 0.7; }

        /* כרטיסייה מסתובבת */
        .flip-card { width: 280px; height: 180px; perspective: 1000px; margin-bottom: 20px; }
        .flip-card-inner { position: relative; width: 100%; height: 100%; text-align: center; transition: transform 0.6s; transform-style: preserve-3d; cursor: pointer; }
        .flip-card.flipped .flip-card-inner { transform: rotateY(180deg); }
        .flip-card-front, .flip-card-back { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; display: flex; align-items: center; justify-content: center; border-radius: 20px; border: 4px solid var(--blue); font-size: 36px; font-weight: bold; background: white; }
        .flip-card-back { background: #eff6ff; color: var(--blue); transform: rotateY(180deg); }

        .speaker-icon { cursor: pointer; font-size: 24px; margin-left: 10px; vertical-align: middle; }

        /* 4 בשורה */
        .c4-header { width: 100%; display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; font-weight: bold; }
        .arrows-row { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; width: 280px; margin-bottom: 5px; }
        .arrow-btn { background: none; border: none; font-size: 20px; cursor: pointer; color: var(--blue); padding: 0; }
        .board { background: var(--blue); display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; padding: 8px; border-radius: 15px; width: 280px; margin: 0 auto; }
        .cell { aspect-ratio: 1; background: #1e3a8a; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
        .token { width: 85%; height: 85%; border-radius: 50%; transform: scale(0); transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .token.show { transform: scale(1); }
        .red { background: var(--red); box-shadow: inset 0 -3px rgba(0,0,0,0.2); }
        .yellow { background: var(--accent); box-shadow: inset 0 -3px rgba(0,0,0,0.2); }

        .hidden { display: none; }
        textarea { width: 100%; height: 120px; border-radius: 15px; padding: 12px; font-family: inherit; margin-bottom: 10px; box-sizing: border-box; border: 2px solid #cbd5e1; }
        
        .score-circle { width: 120px; height: 120px; border-radius: 50%; border: 8px solid var(--blue); display: flex; align-items: center; justify-content: center; font-size: 32px; font-weight: bold; margin: 20px 0; }
    </style>
</head>
<body>

<div class="header">
    <div class="site-name">Word Adventure</div>
    <img src="logo.svg" alt="logo" class="logo" onerror="this.style.display='none'">
</div>

<div class="container">
    <div id="screen-input" class="card-box">
        <textarea id="wordInput" placeholder="שם היחידה&#10;Apple - תפוח&#10;Dog - כלב"></textarea>
        <button class="btn" onclick="initProcess()">מתחילים ללמוד</button>
    </div>

    <div id="screen-cards" class="card-box hidden">
        <div class="flip-card" id="card-flip" onclick="this.classList.toggle('flipped')">
            <div class="flip-card-inner">
                <div class="flip-card-front"><span id="card-eng"></span><span class="speaker-icon" onclick="event.stopPropagation(); speak('eng')">🔊</span></div>
                <div class="flip-card-back" id="card-heb"></div>
            </div>
        </div>
        <div style="display: flex; gap: 10px; width: 100%;">
            <button class="btn btn-red" onclick="handleCard(false)">עוד מעט אדע</button>
            <button class="btn btn-green" onclick="handleCard(true)">יודע!</button>
        </div>
    </div>

    <div id="screen-quiz" class="card-box hidden">
        <div style="font-size: 32px; font-weight: bold; margin-bottom: 20px;">
            <span id="quiz-eng"></span>
            <span class="speaker-icon" onclick="speak('quiz')">🔊</span>
        </div>
        <div id="quiz-options" style="width: 100%;"></div>
    </div>

    <div id="screen-summary" class="card-box hidden">
        <div style="width: 100%; display: flex; justify-content: space-between; font-size: 14px; font-weight: bold; margin-bottom: 10px;">
            <span onclick="location.reload()" style="cursor:pointer; color: var(--blue);">+ רשימה חדשה</span>
            <span onclick="shareLink()" style="cursor:pointer; color: var(--green);">שתף רשימה 🔗</span>
        </div>
        <h2>הציון שלך:</h2>
        <div class="score-circle" id="final-score">0%</div>
        <button class="btn btn-green" onclick="shareAchievement()">שתף הישג בוואטסאפ 🏆</button>
        <button class="btn btn-locked" title="למורים רשומים בלבד">הגשה למורה (למנויים)</button>
        <button class="btn btn-secondary" onclick="restartPractice()">תרגול נוסף לשיפור הציון</button>
        <div id="game-lock-msg" style="margin-top: 15px; font-weight: bold; color: var(--red);"></div>
        <button id="btn-to-game" class="btn hidden" onclick="initGame()">למתחם המשחקים 🎮</button>
    </div>

    <div id="screen-game" class="card-box hidden">
        <button class="btn" style="margin-bottom:15px;" id="btn-game-q" onclick="gameAsk()">שאלה חדשה</button>
        <div class="c4-header">
             <div onclick="showScreen('screen-summary')" style="cursor:pointer; color: #64748b;">❌ יציאה</div>
             <div style="display:flex; align-items:center; gap:8px;">
                תור: <div id="turn-indicator" style="width:18px; height:18px; border-radius:50%; background:var(--red);"></div>
             </div>
        </div>
        <div class="arrows-row">
            ${[0,1,2,3,4,5,6].map(i => `<button class="arrow-btn" onclick="drop(${i})">▼<br>${i+1}</button>`).join('')}
        </div>
        <div class="board" id="board"></div>
        <div id="game-msg" style="margin-top:10px; font-weight:bold;">ענו על שאלה כדי לשחק</div>
    </div>
</div>

<script>
    let state = {
        words: [], queue: [], currentIdx: 0, 
        correct: 0, score: 0, 
        board: Array(6).fill(null).map(() => Array(7).fill(null)),
        turn: 1, canDrop: false, listName: 'היחידה שלי'
    };

    function showScreen(id) {
        ['screen-input', 'screen-cards', 'screen-quiz', 'screen-summary', 'screen-game'].forEach(s => document.getElementById(s).classList.add('hidden'));
        document.getElementById(id).classList.remove('hidden');
    }

    function speak(type) {
        const text = type === 'eng' ? state.queue[0].eng : (type === 'quiz' ? state.words[state.currentIdx].eng : state.currentGameWord);
        window.speechSynthesis.cancel();
        const u = new SpeechSynthesisUtterance(text);
        u.lang = 'en-US';
        window.speechSynthesis.speak(u);
    }

    function initProcess() {
        const val = document.getElementById('wordInput').value;
        const lines = val.split('\n');
        state.listName = lines[0] || 'היחידה שלי';
        state.words = lines.slice(1).filter(l => l.includes('-')).map(l => {
            const [eng, heb] = l.split('-').map(s => s.trim());
            return { eng, heb };
        });
        if(state.words.length < 3) return alert("הזן לפחות 3 מילים");
        restartPractice();
    }

    function restartPractice() {
        state.queue = [...state.words];
        state.correct = 0; state.currentIdx = 0;
        updateCard();
        showScreen('screen-cards');
    }

    function updateCard() {
        if(state.queue.length === 0) return startQuiz();
        document.getElementById('card-flip').classList.remove('flipped');
        document.getElementById('card-eng').innerText = state.queue[0].eng;
        document.getElementById('card-heb').innerText = state.queue[0].heb;
    }

    function handleCard(known) {
        const word = state.queue.shift();
        if(!known) state.queue.push(word);
        updateCard();
    }

    function startQuiz() {
        state.currentIdx = 0;
        showScreen('screen-quiz');
        renderQuiz();
    }

    function renderQuiz() {
        const q = state.words[state.currentIdx];
        document.getElementById('quiz-eng').innerText = q.eng;
        const opts = [q.heb, ...state.words.filter(w => w.heb !== q.heb).map(w => w.heb)].sort(() => 0.5 - Math.random()).slice(0, 4);
        const container = document.getElementById('quiz-options');
        container.innerHTML = '';
        opts.forEach(o => {
            const b = document.createElement('button');
            b.className = 'btn btn-secondary';
            b.innerText = o;
            b.onclick = () => {
                if(o === q.heb) {
                    b.classList.replace('btn-secondary', 'btn-green');
                    state.correct++;
                    setTimeout(nextQuiz, 600);
                } else {
                    b.classList.replace('btn-secondary', 'btn-red');
                    // הצגת התשובה הנכונה בירוק
                    Array.from(container.children).forEach(btn => {
                        if(btn.innerText === q.heb) btn.classList.replace('btn-secondary', 'btn-green');
                    });
                    setTimeout(nextQuiz, 1200);
                }
            };
            container.appendChild(b);
        });
    }

    function nextQuiz() {
        state.currentIdx++;
        if(state.currentIdx < state.words.length) renderQuiz();
        else finishQuiz();
    }

    function finishQuiz() {
        state.score = Math.round((state.correct / state.words.length) * 100);
        document.getElementById('final-score').innerText = state.score + "%";
        const lockMsg = document.getElementById('game-lock-msg');
        const gameBtn = document.getElementById('btn-to-game');
        
        if(state.score >= 70) {
            lockMsg.innerText = "כל הכבוד! המשחקים פתוחים עבורך.";
            lockMsg.style.color = "var(--green)";
            gameBtn.classList.remove('hidden');
        } else {
            lockMsg.innerText = "כדי לשחק עליך לקבל לפחות 70%.";
            lockMsg.style.color = "var(--red)";
            gameBtn.classList.add('hidden');
        }
        showScreen('screen-summary');
    }

    // --- 4 בשורה ---
    function initGame() {
        showScreen('screen-game');
        const b = document.getElementById('board'); b.innerHTML = '';
        state.board = Array(6).fill(null).map(() => Array(7).fill(null));
        for(let r=0; r<42; r++) {
            const c = document.createElement('div'); c.className = 'cell';
            c.id = `c-${Math.floor(r/7)}-${r%7}`;
            b.appendChild(c);
        }
    }

    function gameAsk() {
        const q = state.words[Math.floor(Math.random()*state.words.length)];
        state.currentGameWord = q.eng;
        const ans = prompt(`כיצד אומרים באנגלית: ${q.heb}?`);
        if(ans && ans.trim().toLowerCase() === q.eng.trim().toLowerCase()) {
            state.canDrop = true;
            document.getElementById('game-msg').innerText = "נכון! בחר עמודה";
        } else {
            alert(`טעות. הנכון הוא: ${q.eng}`);
            state.turn = state.turn === 1 ? 2 : 1;
            updateGameUI();
        }
    }

    function drop(c) {
        if(!state.canDrop) return;
        for(let r=5; r>=0; r--) {
            if(!state.board[r][c]) {
                state.board[r][c] = state.turn;
                const t = document.createElement('div');
                t.className = `token ${state.turn===1?'red':'yellow'}`;
                document.getElementById(`c-${r}-${c}`).appendChild(t);
                setTimeout(() => t.classList.add('show'), 10);
                state.canDrop = false;
                state.turn = state.turn === 1 ? 2 : 1;
                updateGameUI();
                return;
            }
        }
    }

    function updateGameUI() {
        document.getElementById('turn-indicator').style.background = state.turn === 1 ? 'var(--red)' : 'var(--accent)';
        document.getElementById('game-msg').innerText = "לחצו על שאלה חדשה";
    }

    function shareAchievement() {
        const text = `קיבלתי ${state.score}% ביחידה "${state.listName}" ב-Word Adventure! נסו גם אתם: ${window.location.href}`;
        window.open(`https://wa.me/?text=${encodeURIComponent(text)}`);
    }

    function shareLink() {
        const data = btoa(unescape(encodeURIComponent(state.words.map(w => `${w.eng}-${w.heb}`).join('|'))));
        const url = `${window.location.origin}${window.location.pathname}?list=${encodeURIComponent(state.listName)}&v=${data}`;
        window.open(`https://wa.me/?text=${encodeURIComponent('הנה רשימת המילים שלי: ' + url)}`);
    }
</script>
</body>
</html>
