<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Word Adventure</title>
    <link href="https://fonts.googleapis.com/css2?family=Comic+Neue:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #f8fafc; --navy: #1e3a8a; --blue: #2563eb; --accent: #facc15; --white: #ffffff; --green: #22c55e; --red: #ef4444; }
        body { font-family: 'Comic Neue', cursive; background: var(--bg); color: var(--navy); margin: 0; text-align: center; overflow-x: hidden; }
        
        /* Header */
        .header { background: white; padding: 20px; display: flex; justify-content: center; align-items: center; box-shadow: 0 4px 10px rgba(0,0,0,0.05); position: relative; }
        .site-name { font-size: 38px; font-weight: 700; color: var(--blue); text-shadow: 2px 2px 0px rgba(37, 99, 235, 0.1); }
        .logo { height: 50px; margin-left: 15px; }

        .container { max-width: 600px; margin: 20px auto; padding: 15px; }
        .card-box { background: white; padding: 30px; border-radius: 30px; box-shadow: 0 15px 35px rgba(0,0,0,0.08); border: 2px solid #e2e8f0; min-height: 400px; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        
        /* Input Screen */
        textarea { width: 100%; height: 250px; border-radius: 20px; padding: 20px; font-family: inherit; font-size: 22px; margin-bottom: 20px; border: 3px solid #cbd5e1; box-sizing: border-box; resize: none; text-align: right; }
        
        .btn { background: var(--blue); color: white; border: none; padding: 18px; border-radius: 20px; font-size: 22px; font-weight: bold; width: 100%; cursor: pointer; margin-top: 10px; font-family: inherit; transition: 0.2s; box-shadow: 0 4px 0 #1d4ed8; }
        .btn:active { transform: translateY(3px); box-shadow: 0 1px 0 #1d4ed8; }
        .btn-green { background: var(--green); box-shadow: 0 4px 0 #16a34a; }
        .btn-red { background: var(--red); box-shadow: 0 4px 0 #dc2626; }
        .btn-secondary { background: #f1f5f9; color: var(--navy); border: 1px solid #e2e8f0; box-shadow: 0 4px 0 #cbd5e1; }
        .btn-locked { background: #cbd5e1; cursor: not-allowed; box-shadow: none; opacity: 0.6; }

        /* Flashcards */
        .flip-card { width: 300px; height: 200px; perspective: 1000px; margin-bottom: 25px; }
        .flip-card-inner { position: relative; width: 100%; height: 100%; transition: transform 0.6s; transform-style: preserve-3d; cursor: pointer; }
        .flip-card.flipped .flip-card-inner { transform: rotateY(180deg); }
        .flip-card-front, .flip-card-back { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; display: flex; align-items: center; justify-content: center; border-radius: 25px; border: 5px solid var(--blue); font-size: 42px; font-weight: bold; background: white; }
        .flip-card-back { background: #eff6ff; color: var(--blue); transform: rotateY(180deg); }
        .speaker { font-size: 28px; margin-right: 15px; cursor: pointer; color: var(--blue); }

        /* Game UI */
        .arrows-row { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; width: 300px; margin: 10px 0; }
        .arrow-btn { background: var(--blue); border: none; border-radius: 8px; color: white; padding: 10px 0; font-weight: bold; cursor: pointer; font-size: 16px; }
        .board { background: var(--navy); display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; padding: 10px; border-radius: 20px; width: 300px; }
        .cell { aspect-ratio: 1; background: #312e81; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
        .token { width: 85%; height: 85%; border-radius: 50%; transform: scale(0); transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .token.show { transform: scale(1); }
        .red { background: var(--red); }
        .yellow { background: var(--accent); }

        .hidden { display: none; }
        .score-display { font-size: 60px; font-weight: bold; color: var(--blue); margin: 20px 0; }
    </style>
</head>
<body>

<div class="header">
    <div class="site-name">Word Adventure</div>
</div>

<div class="container">
    <div id="screen-input" class="card-box">
        <h2 style="margin-top:0">יצירת רשימה חדשה ✨</h2>
        <textarea id="wordInput" placeholder="שם הרשימה (למשל: יחידה 1)&#10;Apple - תפוח&#10;Dog - כלב"></textarea>
        <button class="btn" onclick="initProcess()">מתחילים ללמוד</button>
    </div>

    <div id="screen-cards" class="card-box hidden">
        <div class="flip-card" id="card-flip" onclick="this.classList.toggle('flipped')">
            <div class="flip-card-inner">
                <div class="flip-card-front">
                    <span id="card-eng"></span>
                    <span class="speaker" onclick="event.stopPropagation(); speak('card')">🔊</span>
                </div>
                <div class="flip-card-back" id="card-heb"></div>
            </div>
        </div>
        <div style="display: flex; gap: 10px; width: 100%;">
            <button class="btn btn-red" onclick="handleCard(false)">עוד מעט אדע</button>
            <button class="btn btn-green" onclick="handleCard(true)">יודע!</button>
        </div>
    </div>

    <div id="screen-quiz" class="card-box hidden">
        <div style="font-size: 36px; font-weight: bold; margin-bottom: 25px;">
            <span id="quiz-eng"></span>
            <span class="speaker" onclick="speak('quiz')">🔊</span>
        </div>
        <div id="quiz-options" style="width: 100%;"></div>
    </div>

    <div id="screen-summary" class="card-box hidden">
        <div style="width: 100%; display: flex; justify-content: space-between; font-weight: bold; margin-bottom: 20px;">
            <span onclick="location.reload()" style="cursor:pointer; color: var(--blue);">+ רשימה חדשה</span>
            <span onclick="shareList()" style="cursor:pointer; color: var(--green);">שתף רשימה 🔗</span>
        </div>
        <h2>הציון שלך:</h2>
        <div class="score-display" id="final-score">0%</div>
        <button class="btn btn-green" onclick="shareAchievement()">שתף הישג בוואטסאפ 🏆</button>
        <button class="btn btn-locked">הגשה למורה (למנויים)</button>
        <button class="btn btn-secondary" onclick="restartPractice()">תרגול חוזר לשיפור הציון</button>
        <div id="game-lock-msg" style="margin-top: 20px; font-weight: bold;"></div>
        <button id="btn-to-game" class="btn hidden" onclick="initGame()">למתחם המשחקים 🎮</button>
    </div>

    <div id="screen-game" class="card-box hidden">
        <div id="game-quiz-area" style="width:100%; margin-bottom: 20px;">
             <div style="font-size: 24px; font-weight: bold; margin-bottom: 10px;">
                <span id="game-q-text">ענה כדי לשחק</span>
             </div>
             <div id="game-q-options"></div>
        </div>
        
        <div class="c4-header" style="width:100%; display:flex; justify-content: space-between; align-items:center; margin-bottom:10px;">
            <div onclick="showScreen('screen-summary')" style="cursor:pointer;">❌ יציאה</div>
            <div style="display:flex; align-items:center; gap:8px;">
                תור: <div id="turn-indicator" style="width:20px; height:20px; border-radius:50%; background:var(--red);"></div>
            </div>
        </div>

        <div id="arrows" class="arrows-row"></div>
        <div class="board" id="board"></div>
    </div>
</div>

<script>
    let state = {
        words: [], queue: [], currentIdx: 0, 
        correct: 0, score: 0, 
        board: Array(6).fill(null).map(() => Array(7).fill(null)),
        turn: 1, canDrop: false, listName: ''
    };

    // טעינה מרחוק אם יש לינק
    window.onload = () => {
        const params = new URLSearchParams(window.location.search);
        if(params.has('v')) {
            const data = decodeURIComponent(escape(atob(params.get('v'))));
            const listName = params.get('list') || 'רשימה משותפת';
            document.getElementById('wordInput').value = listName + '\n' + data.split('|').join('\n');
        }
    }

    function showScreen(id) {
        ['screen-input', 'screen-cards', 'screen-quiz', 'screen-summary', 'screen-game'].forEach(s => document.getElementById(s).classList.add('hidden'));
        document.getElementById(id).classList.remove('hidden');
    }

    function speak(mode) {
        let text = '';
        if(mode === 'card') text = state.queue[0].eng;
        if(mode === 'quiz') text = state.words[state.currentIdx].eng;
        if(mode === 'game') text = state.gameActiveWord.eng;
        const u = new SpeechSynthesisUtterance(text);
        u.lang = 'en-US';
        window.speechSynthesis.speak(u);
    }

    function initProcess() {
        const val = document.getElementById('wordInput').value.trim();
        const lines = val.split('\n');
        state.listName = lines[0];
        state.words = lines.slice(1).filter(l => l.includes('-')).map(l => {
            const [eng, heb] = l.split('-').map(s => s.trim());
            return { eng, heb };
        });
        if(state.words.length < 3) return alert("הזן לפחות 3 מילים");
        restartPractice();
    }

    function restartPractice() {
        state.queue = [...state.words];
        state.correct = 0; state.currentIdx = 0;
        updateCard();
        showScreen('screen-cards');
    }

    function updateCard() {
        if(state.queue.length === 0) return startQuiz();
        document.getElementById('card-flip').classList.remove('flipped');
        document.getElementById('card-eng').innerText = state.queue[0].eng;
        document.getElementById('card-heb').innerText = state.queue[0].heb;
    }

    function handleCard(known) {
        const word = state.queue.shift();
        if(!known) state.queue.push(word);
        updateCard();
    }

    function startQuiz() {
        state.currentIdx = 0;
        showScreen('screen-quiz');
        renderQuiz('main');
    }

    function renderQuiz(mode) {
        const q = state.words[mode === 'main' ? state.currentIdx : Math.floor(Math.random()*state.words.length)];
        if(mode === 'game') state.gameActiveWord = q;

        const container = document.getElementById(mode === 'main' ? 'quiz-options' : 'game-q-options');
        const textElem = document.getElementById(mode === 'main' ? 'quiz-eng' : 'game-q-text');
        
        textElem.innerText = q.eng;
        container.innerHTML = '';

        const opts = [q.heb, ...state.words.filter(w => w.heb !== q.heb).map(w => w.heb)].sort(() => 0.5 - Math.random()).slice(0, 4);
        
        opts.forEach(o => {
            const b = document.createElement('button');
            b.className = 'btn btn-secondary';
            b.style.fontSize = '18px';
            b.innerText = o;
            b.onclick = () => {
                if(o === q.heb) {
                    b.classList.replace('btn-secondary', 'btn-green');
                    if(mode === 'main') {
                        state.correct++;
                        setTimeout(() => {
                            state.currentIdx++;
                            if(state.currentIdx < state.words.length) renderQuiz('main');
                            else finishQuiz();
                        }, 500);
                    } else {
                        state.canDrop = true;
                        document.getElementById('game-quiz-area').classList.add('hidden');
                        document.getElementById('arrows').classList.remove('hidden');
                    }
                } else {
                    b.classList.replace('btn-secondary', 'btn-red');
                    if(mode === 'game') {
                        setTimeout(() => {
                            state.turn = state.turn === 1 ? 2 : 1;
                            updateGameUI();
                            renderQuiz('game');
                        }, 800);
                    }
                }
            };
            container.appendChild(b);
        });
    }

    function finishQuiz() {
        state.score = Math.round((state.correct / state.words.length) * 100);
        document.getElementById('final-score').innerText = state.score + "%";
        const msg = document.getElementById('game-lock-msg');
        const btn = document.getElementById('btn-to-game');
        
        if(state.score >= 70) {
            msg.innerText = "כל הכבוד! מתחם המשחקים פתוח.";
            msg.style.color = "var(--green)";
            btn.classList.remove('hidden');
        } else {
            msg.innerText = "צריך לפחות 70% כדי לשחק. נסה שוב!";
            msg.style.color = "var(--red)";
            btn.classList.add('hidden');
        }
        showScreen('screen-summary');
    }

    // 4 בשורה
    function initGame() {
        showScreen('screen-game');
        state.board = Array(6).fill(null).map(() => Array(7).fill(null));
        document.getElementById('board').innerHTML = '';
        for(let i=0; i<42; i++) {
            const c = document.createElement('div'); c.className = 'cell';
            c.id = `c-${Math.floor(i/7)}-${i%7}`;
            document.getElementById('board').appendChild(c);
        }
        const arrows = document.getElementById('arrows');
        arrows.innerHTML = '';
        for(let i=0; i<7; i++) {
            const b = document.createElement('button'); b.className = 'arrow-btn';
            b.innerHTML = `▼<br>${i+1}`;
            b.onclick = () => drop(i);
            arrows.appendChild(b);
        }
        updateGameUI();
        renderQuiz('game');
    }

    function drop(c) {
        if(!state.canDrop) return;
        for(let r=5; r>=0; r--) {
            if(!state.board[r][c]) {
                state.board[r][c] = state.turn;
                const t = document.createElement('div');
                t.className = `token show ${state.turn===1?'red':'yellow'}`;
                document.getElementById(`c-${r}-${c}`).appendChild(t);
                state.canDrop = false;
                state.turn = state.turn === 1 ? 2 : 1;
                updateGameUI();
                document.getElementById('game-quiz-area').classList.remove('hidden');
                document.getElementById('arrows').classList.add('hidden');
                renderQuiz('game');
                return;
            }
        }
    }

    function updateGameUI() {
        document.getElementById('turn-indicator').style.background = state.turn === 1 ? 'var(--red)' : 'var(--accent)';
        document.getElementById('arrows').classList.add('hidden');
    }

    function shareAchievement() {
        const text = `הצלחתי ללמוד את "${state.listName}" עם ציון ${state.score}%! 🏆 כנסו ללמוד גם: ${window.location.href}`;
        window.open(`https://wa.me/?text=${encodeURIComponent(text)}`);
    }

    function shareList() {
        const data = btoa(unescape(encodeURIComponent(state.words.map(w => `${w.eng}-${w.heb}`).join('|'))));
        const url = `${window.location.origin}${window.location.pathname}?list=${encodeURIComponent(state.listName)}&v=${data}`;
        window.open(`https://wa.me/?text=${encodeURIComponent('הנה רשימת המילים החדשה שלי: ' + url)}`);
    }
</script>
</body>
</html>
