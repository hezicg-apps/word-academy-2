<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Word Academy</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="header">
    <div id="user-display">שלום, מורה!</div>
    <div class="header-left" 
         onmousedown="startPress()" 
         onmouseup="endPress()" 
         ontouchstart="startPress()" 
         ontouchend="endPress()" 
         style="cursor: pointer; user-select: none;">
        <img src="logo.svg" alt="WA" class="logo-img">
        <h2 style="font-size:18px; color:var(--blue); margin:0; font-family: inherit;">Word Academy</h2>
    </div>
</div>

<div class="container">
    <div id="screen-input" class="card-box">
        <h2 style="margin-top:0;">מה לומדים היום? ✨</h2>
        <textarea id="wordInput" placeholder="שם היחידה&#10;Apple - תפוח&#10;Sun - שמש..."></textarea>
        <button class="btn" onclick="initApp()">יוצאים לדרך</button>
    </div>

    <div id="screen-quiz" class="card-box hidden">
        <div id="quiz-header" style="display:flex; justify-content:space-between; margin-bottom:15px; color:#64748b; font-size:14px;">
            <span id="quiz-unit-display"></span>
            <span id="quiz-progress"></span>
        </div>
        <div class="question-card">
            <div id="quiz-eng" style="font-size:32px; font-weight:bold; margin-bottom:10px;"></div>
            <button class="audio-btn" onclick="speak(document.getElementById('quiz-eng').innerText)">🔊 הקשיבו</button>
        </div>
        <div id="quiz-options" class="options-grid"></div>
    </div>

    <div id="screen-summary" class="card-box hidden">
        <h2 style="margin-top:0;">כל הכבוד! 🏆</h2>
        <div id="final-score" style="font-size:48px; font-weight:bold; color:var(--blue); margin:10px 0;"></div>
        <p>המשחקים נפתחים בציון 70% ומעלה</p>
        
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:20px;">
            <button id="btn-c4" class="btn" onclick="startC4()" disabled style="background:var(--accent); color:black;">4 בשורה 🔴</button>
            <button id="btn-mem" class="btn" onclick="startMemory()" disabled style="background:var(--navy); color:white;">משחק הזיכרון 🧠</button>
        </div>

        <button class="btn" onclick="location.reload()" style="background:white; color:var(--blue); border:2px solid var(--blue);">תרגול חדש</button>
        
        <div style="margin-top:20px; display:flex; gap:10px; justify-content:center;">
            <button onclick="shareAchievement()" style="background:none; border:none; cursor:pointer; font-size:24px;">📱</button>
            <button onclick="shareList()" style="background:none; border:none; cursor:pointer; font-size:24px;">🔗</button>
        </div>
    </div>

    <div id="screen-c4" class="card-box hidden" style="max-width:500px;">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
            <span onclick="showScreen('screen-summary')" style="cursor:pointer; font-weight:bold;">✖ סגור</span>
            <button id="c4-turn-btn" class="btn" style="padding:5px 15px; margin:0; min-width:120px;" onclick="askC4Question()">שאלה</button>
        </div>
        <div style="display:grid; grid-template-columns:repeat(7,1fr); width:100%; max-width:450px; margin:0 auto 10px; color:var(--blue);">
            <span class="drop-arrow" onclick="dropToken(0)">▼</span>
            <span class="drop-arrow" onclick="dropToken(1)">▼</span>
            <span class="drop-arrow" onclick="dropToken(2)">▼</span>
            <span class="drop-arrow" onclick="dropToken(3)">▼</span>
            <span class="drop-arrow" onclick="dropToken(4)">▼</span>
            <span class="drop-arrow" onclick="dropToken(5)">▼</span>
            <span class="drop-arrow" onclick="dropToken(6)">▼</span>
        </div>
        <div class="board" id="c4-board"></div>
    </div>

    <div id="screen-memory" class="card-box hidden">
        <div style="text-align:left; margin-bottom:10px;"><span onclick="showScreen('screen-summary')" style="cursor:pointer; font-weight:bold;">✖ סגור</span></div>
        <div id="memory-moves">צעדים: 0</div>
        <div id="memory-grid" class="memory-grid"></div>
    </div>
</div>

<div id="msg-modal" class="modal">
    <div class="modal-content">
        <div id="msg-stripe" class="modal-stripe"></div>
        <div id="msg-body" class="modal-body"></div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-firestore-compat.js"></script>

<script src="js/main.js"></script>
<script src="js/connect4.js"></script>
<script src="js/memory.js"></script>

</body>
</html>
