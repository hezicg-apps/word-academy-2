<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Admin | Word Academy</title>
    <link rel="stylesheet" href="css/style.css">
    <style>body { display: none; }</style>
</head>
<body>
    <script>
        const pass = prompt("סיסמת מנהל:");
        if (pass === "1234") { document.body.style.display = "block"; }
        else { location.href = 'index.html'; }
    </script>

    <div class="header">
        <div class="header-left">
            <img src="logo.svg" alt="WA" class="logo-img">
            <h2>ניהול יחידות</h2>
        </div>
    </div>

    <div class="container" style="margin-top:20px;">
        <div class="card-box">
            <h3>הוספת יחידה ל-Firebase ☁️</h3>
            <input type="number" id="uNum" placeholder="מספר יחידה" class="opt-btn" style="text-align:center;">
            <input type="text" id="uTitle" placeholder="שם היחידה" class="opt-btn" style="text-align:center;">
            <textarea id="uWords" placeholder="English - עברית" style="width:100%; height:150px; margin:10px 0; padding:10px; border-radius:10px; border:1px solid #ccc;"></textarea>
            <button class="btn" onclick="saveToDB()">שמור בשרת ☁️</button>
            <p id="status"></p>
            <button class="btn" style="background:none; border:1px solid #2563eb; color:#2563eb; margin-top:10px;" onclick="location.href='index.html'">חזרה לאתר</button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-firestore-compat.js"></script>
    <script>
        firebase.initializeApp({
            apiKey: "AIzaSyCD7Xb0xOyW5Objw0Q0Fu0HIyyMH2D7B_8",
            authDomain: "word-academy-8b91d.firebaseapp.com",
            projectId: "word-academy-8b91d"
        });
        const db = firebase.firestore();

        async function saveToDB() {
            const num = document.getElementById('uNum').value;
            const title = document.getElementById('uTitle').value;
            const words = document.getElementById('uWords').value.split('\n').filter(l => l.includes('-')).map(l => {
                const p = l.split('-');
                return { eng: p[0].trim(), heb: p[1].trim() };
            });
            try {
                await db.collection("units").doc(num).set({ title, words });
                document.getElementById('status').innerText = "✅ נשמר בהצלחה!";
            } catch (e) { alert("שגיאה בשמירה"); }
        }
    </script>
</body>
</html>
