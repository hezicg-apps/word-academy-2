<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ניהול יחידות | Word Academy</title>
    <link rel="stylesheet" href="css/style.css">
    
    <style>
        /* הסתרת הגוף עד לאימות סיסמה */
        body { 
            display: none; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; 
            margin: 0; 
        }

        /* מִרְכּוּז מכולת התוכן */
        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 500px;
            padding: 20px;
        }

        .card-box {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        /* עיצוב שדות קלט ממורכזים */
        .opt-btn {
            width: 100%;
            max-width: 400px;
            text-align: center;
            margin-bottom: 15px;
        }

        /* עיצוב תיבת המילים - יישור לשמאל LTR */
        textarea#uWords {
            width: 100%;
            max-width: 400px;
            height: 200px;
            margin: 10px 0;
            padding: 15px;
            border-radius: 15px;
            border: 2px solid var(--border);
            /* הגדרות כיוון טקסט LTR */
            direction: ltr !important;
            text-align: left !important;
            font-family: monospace; /* גופן קבוע לאנגלית */
            resize: none; /* ביטול אפשרות שינוי גודל ידני */
        }

        /* עיצוב כפתורים ממורכזים */
        .btn {
            width: 100%;
            max-width: 400px;
            margin: 10px 0;
        }

        /* עיצוב כותרות ללא אייקונים */
        h2, h3 {
            margin-top: 0;
            margin-bottom: 20px;
            color: var(--blue);
        }
    </style>
</head>
<body>
    <script>
        const pass = prompt("סיסמת מנהל:");
        // שנה כאן את הסיסמה למה שתרצה
        if (pass === "1234") { 
            document.body.style.display = "flex"; 
        } else { 
            alert("סיסמה שגויה");
            location.href = 'index.html'; 
        }
    </script>

    <div class="header">
        <div class="header-left">
            <img src="logo.svg" alt="WA" class="logo-img">
        </div>
    </div>

    <div class="container">
        <div class="card-box">
            <h3>הוספת יחידה לשרת</h3>
            
            <input type="number" id="uNum" placeholder="מספר יחידה" class="opt-btn">
            <input type="text" id="uTitle" placeholder="שם היחידה" class="opt-btn">
            
            <textarea id="uWords" placeholder="English - Hebrew"></textarea>
            
            <button class="btn" onclick="saveToDB()">שמור בשרת</button>
            <p id="status"></p>
            
            <button class="btn" style="background:none; border:2px solid var(--blue); color:var(--blue); margin-top:20px;" onclick="location.href='index.html'">חזרה לאתר</button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-firestore-compat.js"></script>
    
    <script>
        // קונפיגורציית Firebase שלך
        firebase.initializeApp({
            apiKey: "AIzaSyCD7Xb0xOyW5Objw0Q0Fu0HIyyMH2D7B_8",
            authDomain: "word-academy-8b91d.firebaseapp.com",
            projectId: "word-academy-8b91d"
        });
        const db = firebase.firestore();

        async function saveToDB() {
            const num = document.getElementById('uNum').value;
            const title = document.getElementById('uTitle').value;
            const wordsRaw = document.getElementById('uWords').value;
            const status = document.getElementById('status');

            if (!num || !title || !wordsRaw) {
                alert("נא למלא את כל השדות");
                return;
            }

            // עיבוד המילים בפורמט LTR
            const words = wordsRaw.split('\n').filter(l => l.includes('-')).map(l => {
                const p = l.split('-');
                return { eng: p[0].trim(), heb: p[1].trim() };
            });

            if (words.length === 0) {
                alert("פורמט המילים שגוי. יש להשתמש ב: English - Hebrew");
                return;
            }

            try {
                await db.collection("units").doc(num).set({ title, words });
                status.innerText = "נשמר בהצלחה";
                status.style.color = "var(--green)";
            } catch (e) { 
                console.error(e);
                status.innerText = "שגיאה בשמירה";
                status.style.color = "var(--red)";
            }
        }
    </script>
</body>
</html>
